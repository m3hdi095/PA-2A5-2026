server {
    listen 80;
    server_name upcycleconnect.art www.upcycleconnect.art;

    # Redirige tout le HTTP vers HTTPS, qui est obligatoire pour Stripe
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name upcycleconnect.art www.upcycleconnect.art;

    # Certificats Let's Encrypt — générés avec : certbot --nginx -d upcycleconnect.art
    ssl_certificate     /etc/letsencrypt/live/upcycleconnect.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upcycleconnect.art/privkey.pem;

    # Racine du frontend statique
    root /var/www/upcycleconnect;
    index index.html;

    # Réécriture d'URL, ici les routes sans extension servent index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Proxy vers l'API Go (port 8080)
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Pages d'erreur personnalisées 
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    location = /404.html {
        root /var/www/upcycleconnect;
        internal;
    }

    location = /500.html {
        root /var/www/upcycleconnect;
        internal;
    }
}
