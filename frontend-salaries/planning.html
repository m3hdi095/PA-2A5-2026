<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon planning | Espace Salariés</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1><div class="page-title-icon teal"><i class="fa-solid fa-calendar-days"></i></div><span data-i18n="planning_title">Mon planning</span></h1>
    <p class="page-title-sub" data-i18n="planning_subtitle">Vos interventions et formations à venir</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> <span data-i18n="planning_btn_add">Ajouter un créneau</span></button>
  </div>
</div>

<div class="card animate-in">
  <div class="card-header"><h2><i class="fa-solid fa-calendar-week"></i> <span data-i18n="planning_week_label">Semaine du</span> <span id="planning-week-range">21 au 27 avril 2026</span></h2></div>
  <div class="card-body">
    <div class="planning-list" id="planning-list"></div>
  </div>
</div>

<script src="js/layout.js"></script>
<script>
const COLORS = { atelier:'var(--green-700)', formation:'#e8a020', reunion:'#5C7C6E', evenement:'#2e8b57' };

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPlanning(items) {
  const container = document.getElementById('planning-list');
  if (!container) return;
  const locale = typeof _lang !== 'undefined' && _lang === 'en' ? 'en-GB' : 'fr-FR';

  if (!items.length) {
    container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted)">Aucun événement à venir dans votre planning.</p>';
    return;
  }

  container.innerHTML = items.map(e => {
    const type = e.type || 'evenement';
    const couleur = COLORS[type] || 'var(--green-500)';
    const dateStr = e.date_debut
      ? new Date(e.date_debut).toLocaleDateString(locale, { weekday:'short', day:'numeric', month:'short' })
      : (e.date_heure ? new Date(e.date_heure).toLocaleDateString(locale, { weekday:'short', day:'numeric', month:'short' }) : '');
    return `
      <div class="planning-item" style="border-left:3px solid ${couleur}">
        <div class="planning-date">${esc(dateStr)}</div>
        <div class="planning-content">
          <div class="planning-title">${esc(e.titre || '')}</div>
          <div class="planning-meta">
            ${e.lieu ? `<i class="fa-solid fa-location-dot"></i> ${esc(e.lieu)}` : ''}
            ${e.nb_places ? ` &nbsp;·&nbsp; <i class="fa-solid fa-users"></i> ${e.nb_places} places` : ''}
          </div>
        </div>
        <span class="badge" style="background:${couleur}20;color:${couleur};text-transform:capitalize">${esc(type)}</span>
      </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('planning');
  let items = [];
  try {
    const res = await apiFetch('/evenements/mes-inscriptions');
    if (res?.ok) { const d = await res.json(); if (Array.isArray(d)) items = d; }
  } catch {}
  if (!items.length) {
    try {
      const res = await apiFetch('/planning/me');
      if (res?.ok) { const d = await res.json(); if (Array.isArray(d)) items = d; }
    } catch {}
  }
  renderPlanning(items);
});
</script>
</body>
</html>
