<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon planning | Espace Salariés</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1><div class="page-title-icon teal"><i class="fa-solid fa-calendar-days"></i></div><span data-i18n="planning_title">Mon planning</span></h1>
    <p class="page-title-sub" data-i18n="planning_subtitle">Vos interventions et formations à venir</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> <span data-i18n="planning_btn_add">Ajouter un créneau</span></button>
  </div>
</div>

<div class="card animate-in">
  <div class="card-header"><h2><i class="fa-solid fa-calendar-week"></i> <span data-i18n="planning_week_label">Semaine du</span> <span id="planning-week-range">21 au 27 avril 2026</span></h2></div>
  <div class="card-body">
    <div class="planning-list" id="planning-list"></div>
  </div>
</div>

<script src="js/layout.js"></script>
<script>
const MOCK = [
  { date:'Lun 21 avr', heure:'10h00-12h30', titre:'Atelier mosaïque verre', lieu:'Paris 11e', type:'atelier', places:8 },
  { date:'Mar 22 avr', heure:'14h00-17h00', titre:'Formation couture recyclée', lieu:'Montreuil', type:'formation', places:12 },
  { date:'Jeu 24 avr', heure:'09h00-11h00', titre:'Réunion équipe Again²', lieu:'Siège Again²', type:'reunion', places:0 },
  { date:'Sam 26 avr', heure:'10h00-16h00', titre:'Journée portes ouvertes upcycling', lieu:'Paris 20e', type:'evenement', places:50 },
];
const COLORS = { atelier:'var(--green-700)', formation:'#e8a020', reunion:'#5C7C6E', evenement:'#2e8b57' };
document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('planning');
  document.getElementById('planning-list').innerHTML = MOCK.map(e => `
    <div class="planning-item" style="border-left:3px solid ${COLORS[e.type]||'var(--green-500)'}">
      <div class="planning-date">${e.date}</div>
      <div class="planning-content">
        <div class="planning-title">${e.titre}</div>
        <div class="planning-meta"><i class="fa-solid fa-clock"></i> ${e.heure} &nbsp;·&nbsp; <i class="fa-solid fa-location-dot"></i> ${e.lieu}${e.places?` &nbsp;·&nbsp; <i class="fa-solid fa-users"></i> ${e.places} places`:''}</div>
      </div>
      <span class="badge" style="background:${COLORS[e.type]}20;color:${COLORS[e.type]};text-transform:capitalize">${e.type}</span>
    </div>`).join('');
});
</script>
</body>
</html>
