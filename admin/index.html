<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - UpcycleConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="assets/logo.png" alt="Again²" class="logo">
            <h2><i class="fas fa-lock"></i> Espace Administrateur</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@upcycleconnect.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-key"></i> Mot de passe</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
            </form>
            <div id="error-message" class="error-message"></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
