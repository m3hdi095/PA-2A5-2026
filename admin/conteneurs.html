<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conteneurs | UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Montserrat:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .conteneurs-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      height: calc(100vh - 180px);
      min-height: 500px;
    }
    .conteneurs-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    #map {
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      height: 100%;
      min-height: 400px;
      z-index: 1;
    }
    .conteneur-item {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-xs);
      padding: 14px 16px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .conteneur-item:hover,
    .conteneur-item.active {
      border-color: var(--uc-teal);
      box-shadow: var(--shadow-sm);
    }
    .conteneur-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .conteneur-nom {
      font-weight: 600;
      font-size: 14px;
      color: var(--neutral-900);
    }
    .conteneur-adresse {
      font-size: 12px;
      color: var(--neutral-500);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .conteneur-adresse i { font-size: 11px; color: var(--uc-teal); }
    .fill-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--neutral-500);
    }
    .fill-row .progress-bar { flex: 1; }
    .fill-pct { font-weight: 600; min-width: 34px; text-align: right; }
    .fill-pct.danger { color: var(--danger); }
    .fill-pct.warn   { color: var(--warning); }
    .fill-pct.ok     { color: var(--uc-teal); }
    .progress-fill.danger { background: var(--danger); }
    .progress-fill.warn   { background: var(--warning); }

    /* Panneau détail */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45,74,62,0.45);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .detail-title { font-size: 18px; font-weight: 700; color: var(--neutral-900); }
    .detail-sub   { font-size: 12px; color: var(--neutral-500); margin-top: 2px; }
    .detail-close { background: none; border: none; font-size: 18px; color: var(--neutral-300); cursor: pointer; padding: 4px; }
    .detail-close:hover { color: var(--neutral-900); }
    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-stat {
      background: var(--neutral-50);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .detail-stat-val  { font-size: 22px; font-weight: 700; color: var(--uc-forest); font-family: 'Montserrat', sans-serif; }
    .detail-stat-lbl  { font-size: 11px; color: var(--neutral-500); margin-top: 2px; }
    .historique-list { display: flex; flex-direction: column; gap: 8px; }
    .historique-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--neutral-100);
      font-size: 13px;
    }
    .historique-item:last-child { border-bottom: none; }
    .historique-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--uc-teal);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .tournee-form { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

    @media (max-width: 900px) {
      .conteneurs-layout { grid-template-columns: 1fr; height: auto; }
      #map { height: 320px; }
    }
  </style>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-box-archive" aria-hidden="true"></i>
      </div>
      <span data-i18n="nav_conteneurs">Conteneurs</span>
    </h1>
    <p class="page-title-sub" data-i18n="cont_subtitle">Carte interactive et gestion des points de collecte</p>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost" id="btnTournee" style="gap:6px">
      <i class="fa-solid fa-route" aria-hidden="true"></i>
      <span data-i18n="cont_btn_tournee">Planifier une tournée</span>
    </button>
    <button class="btn btn-primary btn-sm" id="btnAddConteneur" style="gap:6px">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="btn_add">Ajouter</span>
    </button>
  </div>
</div>

<!-- Barre filtres -->
<div class="filters-bar" style="margin-bottom:16px">
  <input type="text" id="searchConteneur" class="search-input" data-i18n-placeholder="cont_search" placeholder="Rechercher un conteneur..." style="max-width:280px"/>
  <select id="filterStatut" class="filter-select">
    <option value="" data-i18n="users_status_all">Tous les statuts</option>
    <option value="actif" data-i18n="user_actif">Actif</option>
    <option value="maintenance" data-i18n="cont_statut_maintenance">En maintenance</option>
    <option value="sature" data-i18n="cont_statut_sature">Saturé</option>
  </select>
  <div style="margin-left:auto;font-size:12px;color:var(--neutral-500)" id="countLabel"></div>
</div>

<!-- Layout carte + liste -->
<div class="conteneurs-layout">
  <div class="conteneurs-panel" id="conteneursList"></div>
  <div id="map"></div>
</div>

<!-- Modale détail conteneur -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="detailNom">—</div>
        <div class="detail-sub" id="detailAdresse">—</div>
      </div>
      <button class="detail-close" id="detailClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="detail-stats">
      <div class="detail-stat">
        <div class="detail-stat-val" id="detailRemplissage">—%</div>
        <div class="detail-stat-lbl" data-i18n="cont_taux_remplissage">Taux de remplissage</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="detailCapacite">—</div>
        <div class="detail-stat-lbl" data-i18n="cont_capacite">Capacité max (objets)</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="detailOuvertures">—</div>
        <div class="detail-stat-lbl" data-i18n="cont_ouvertures">Ouvertures ce mois</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="detailStatutVal">—</div>
        <div class="detail-stat-lbl" data-i18n="factures_th_statut">Statut</div>
      </div>
    </div>
    <h3 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--neutral-500);margin-bottom:10px" data-i18n="cont_historique">
      Historique récent
    </h3>
    <div class="historique-list" id="detailHistorique"></div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn btn-ghost btn-sm" id="detailMaintenance">
        <i class="fa-solid fa-wrench"></i> <span data-i18n="cont_btn_maintenance">Passer en maintenance</span>
      </button>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger)" id="detailDesactiver">
        <i class="fa-solid fa-ban"></i> <span data-i18n="cont_btn_desactiver">Désactiver</span>
      </button>
    </div>
  </div>
</div>

<!-- Modale tournée -->
<div class="modal-overlay" id="tourneeModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2 class="modal-title">
        <i class="fa-solid fa-route" aria-hidden="true"></i>
        <span data-i18n="cont_btn_tournee">Planifier une tournée</span>
      </h2>
      <button class="modal-close" id="tourneClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <form id="tourneeForm" class="tournee-form">
      <div class="form-group">
        <label class="form-label" data-i18n="cont_form_date">Date de collecte</label>
        <input type="date" id="tourneeDate" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="cont_form_conteneurs">Conteneurs à inclure</label>
        <select id="tourneeConteneurs" class="form-control" multiple style="height:110px"></select>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="cont_form_note">Note pour le collecteur</label>
        <textarea id="tourneeNote" class="form-control" rows="3" placeholder="Ex: priorité aux conteneurs saturés..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="tourneCancel" data-i18n="btn_cancel">Annuler</button>
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="fa-solid fa-check"></i> <span data-i18n="cont_btn_confirm_tournee">Confirmer la tournée</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/layout.js"></script>
<script>
// Données de démo - à remplacer par GET /api/admin/conteneurs
const MOCK_CONTENEURS = [
  { id:1, nom:'Conteneur République',   adresse:'Place de la République, Paris 11e', lat:48.8674, lng:2.3633, capacite:50, objets:47, statut:'sature',     ouvertures:23, historique:[
    { date:'2026-04-18', action:'Dépôt', user:'Marie D.', objet:'Palettes bois' },
    { date:'2026-04-17', action:'Récupération', user:'Pro Upcycle', objet:'Textiles x3' },
    { date:'2026-04-15', action:'Dépôt', user:'Jean L.', objet:'Appareils élec.' },
  ]},
  { id:2, nom:'Conteneur Bastille',     adresse:'Boulevard Richard-Lenoir, Paris 11e', lat:48.8533, lng:2.3692, capacite:40, objets:18, statut:'actif',     ouvertures:11, historique:[
    { date:'2026-04-16', action:'Dépôt', user:'Sophie M.', objet:'Vêtements' },
    { date:'2026-04-14', action:'Récupération', user:'Asso Recup', objet:'Métal x5' },
  ]},
  { id:3, nom:'Conteneur Nation',       adresse:'Place de la Nation, Paris 12e', lat:48.8484, lng:2.3960, capacite:60, objets:15, statut:'actif',      ouvertures:8, historique:[
    { date:'2026-04-17', action:'Dépôt', user:'Clara N.', objet:'Plastique' },
  ]},
  { id:4, nom:'Conteneur Oberkampf',    adresse:'Rue Oberkampf, Paris 11e', lat:48.8645, lng:2.3711, capacite:35, objets:29, statut:'actif',     ouvertures:16, historique:[
    { date:'2026-04-18', action:'Dépôt', user:'Kevin R.', objet:'Bois' },
    { date:'2026-04-18', action:'Dépôt', user:'Amina D.', objet:'Verre' },
  ]},
  { id:5, nom:'Conteneur Montreuil',    adresse:'Rue de Vincennes, Montreuil', lat:48.8574, lng:2.4421, capacite:80, objets:12, statut:'actif',      ouvertures:5, historique:[
    { date:'2026-04-15', action:'Dépôt', user:'Marc L.', objet:'Électronique' },
  ]},
  { id:6, nom:'Conteneur Voltaire',     adresse:'Boulevard Voltaire, Paris 11e', lat:48.8597, lng:2.3775, capacite:45, objets:38, statut:'maintenance', ouvertures:0, historique:[
    { date:'2026-04-10', action:'Maintenance', user:'Équipe tech', objet:'Verrou remplacé' },
  ]},
];

let conteneursFiltres = [...MOCK_CONTENEURS];
let mapInstance = null;
let markers = {};
let conteneurActif = null;

const STATUT_CONFIG = {
  actif:       { badge: 'badge-green', i18nKey: 'user_actif' },
  sature:      { badge: 'badge-red',   i18nKey: 'cont_statut_sature' },
  maintenance: { badge: 'badge-gray',  i18nKey: 'cont_statut_maintenance' },
};

function tauxRemplissage(c) {
  return c.capacite ? Math.round(c.objets / c.capacite * 100) : 0;
}

function classFill(pct) {
  if (pct >= 90) return 'danger';
  if (pct >= 70) return 'warn';
  return 'ok';
}

// LIst:  
function renderListe() {
  const liste = document.getElementById('conteneursList');
  document.getElementById('countLabel').textContent = `${conteneursFiltres.length} ${t('cont_count_suffix')}`;

  if (!conteneursFiltres.length) {
    liste.innerHTML = `<div class="empty-state" style="padding:40px 0;text-align:center;color:var(--neutral-300)">
      <i class="fa-solid fa-box-open" style="font-size:32px"></i><p>${t('cont_none')}</p>
    </div>`;
    return;
  }

  liste.innerHTML = conteneursFiltres.map(c => {
    const pct  = tauxRemplissage(c);
    const cls  = classFill(pct);
    const stat = STATUT_CONFIG[c.statut] || STATUT_CONFIG.actif;
    return `
      <div class="conteneur-item" id="item-${c.id}" onclick="ouvrirDetail(${c.id})">
        <div class="conteneur-item-header">
          <span class="conteneur-nom">${escAdmin(c.nom)}</span>
          <span class="badge ${stat.badge}">${t(stat.i18nKey)}</span>
        </div>
        <div class="conteneur-adresse">
          <i class="fa-solid fa-location-dot"></i>${escAdmin(c.adresse)}
        </div>
        <div class="fill-row">
          <span style="font-size:11px;white-space:nowrap">${c.objets}/${c.capacite}</span>
          <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
          <span class="fill-pct ${cls}">${pct}%</span>
        </div>
      </div>`;
  }).join('');
}

// carte leaflet: 
function initMap() {
  mapInstance = L.map('map').setView([48.860, 2.380], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19,
  }).addTo(mapInstance);
  MOCK_CONTENEURS.forEach(c => ajouterMarqueur(c));
}

function couleurMarqueur(statut) {
  if (statut === 'sature')      return '#c0392b';
  if (statut === 'maintenance') return '#BCB3A6';
  return '#2D4A3E';
}

function ajouterMarqueur(c) {
  const icone = L.divIcon({
    className: '',
    html: `<div style="
      width:32px;height:32px;border-radius:50% 50% 50% 0;
      background:${couleurMarqueur(c.statut)};
      border:3px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,0.25);
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;">
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
  });

  const pct = tauxRemplissage(c);
  const marker = L.marker([c.lat, c.lng], { icon: icone })
    .addTo(mapInstance)
    .bindPopup(`
      <div style="font-family:Montserrat,sans-serif;min-width:180px">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${escAdmin(c.nom)}</div>
        <div style="font-size:11px;color:#7A7570;margin-bottom:8px">${escAdmin(c.adresse)}</div>
        <div style="font-size:12px;margin-bottom:4px">
          <b>${pct}%</b> ${t('cont_popup_rempli')} <b>${c.objets}/${c.capacite}</b> ${t('cont_popup_objets')}
        </div>
        <button onclick="ouvrirDetail(${c.id})" style="
          margin-top:6px;background:#2D4A3E;color:#fff;border:none;
          padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;width:100%">
          ${t('cont_voir_detail')}
        </button>
      </div>
    `);
  marker.on('click', () => {
    activerItem(c.id);
  });
  markers[c.id] = marker;
}

function activerItem(id) {
  document.querySelectorAll('.conteneur-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${id}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  conteneurActif = id;
}

// détail: 
window.ouvrirDetail = id => {
  const c = MOCK_CONTENEURS.find(x => x.id === id);
  if (!c) return;
  activerItem(id);

  // Centrer la carte sur le conteneur
  if (mapInstance && markers[id]) {
    mapInstance.setView([c.lat, c.lng], 15, { animate: true });
    markers[id].openPopup();
  }

  const pct  = tauxRemplissage(c);
  const stat = STATUT_CONFIG[c.statut] || STATUT_CONFIG.actif;
  document.getElementById('detailNom').textContent      = c.nom;
  document.getElementById('detailAdresse').textContent  = c.adresse;
  document.getElementById('detailRemplissage').textContent = pct + '%';
  document.getElementById('detailCapacite').textContent    = c.capacite;
  document.getElementById('detailOuvertures').textContent  = c.ouvertures;
  document.getElementById('detailStatutVal').innerHTML     = `<span class="badge ${stat.badge}">${t(stat.i18nKey)}</span>`;

  const hist = c.historique || [];
  document.getElementById('detailHistorique').innerHTML = hist.length
    ? hist.map(h => `
      <div class="historique-item">
        <div class="historique-dot"></div>
        <div>
          <div style="font-weight:600;font-size:13px">${escAdmin(h.action)} : ${escAdmin(h.objet)}</div>
          <div style="font-size:11px;color:var(--neutral-400)">${h.user} · ${h.date}</div>
        </div>
      </div>`).join('')
    : `<p style="font-size:13px;color:var(--neutral-300)">${t('cont_no_historique')}</p>`;

  document.getElementById('detailOverlay').classList.add('open');
};

//  Filtres: 
function appliquerFiltres() {
  const q = document.getElementById('searchConteneur').value.toLowerCase();
  const s = document.getElementById('filterStatut').value;
  conteneursFiltres = MOCK_CONTENEURS.filter(c =>
    (c.nom.toLowerCase().includes(q) || c.adresse.toLowerCase().includes(q)) &&
    (s === '' || c.statut === s)
  );
  renderListe();
}

// tournée:  
function remplirSelectTournee() {
  const sel = document.getElementById('tourneeConteneurs');
  sel.innerHTML = MOCK_CONTENEURS.map(c =>
    `<option value="${c.id}" ${c.statut === 'sature' ? 'selected' : ''}>${escAdmin(c.nom)}</option>`
  ).join('');
}

function escAdmin(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// init: 
document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('conteneurs');

  // Date min = aujourd'hui pour la planification
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tourneeDate').min = today;
  document.getElementById('tourneeDate').value = today;

  renderListe();
  initMap();
  remplirSelectTournee();

  document.getElementById('searchConteneur').addEventListener('input', appliquerFiltres);
  document.getElementById('filterStatut').addEventListener('change', appliquerFiltres);

  document.getElementById('detailClose').addEventListener('click', () => {
    document.getElementById('detailOverlay').classList.remove('open');
  });
  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay'))
      document.getElementById('detailOverlay').classList.remove('open');
  });

  document.getElementById('detailMaintenance').addEventListener('click', () => {
    showToast(t('cont_toast_maintenance'), 'warning');
    document.getElementById('detailOverlay').classList.remove('open');
  });
  document.getElementById('detailDesactiver').addEventListener('click', () => {
    showToast(t('cont_toast_desactive'), 'error');
    document.getElementById('detailOverlay').classList.remove('open');
  });

  document.getElementById('btnTournee').addEventListener('click', () => {
    document.getElementById('tourneeModal').classList.add('open');
  });
  document.getElementById('tourneClose').addEventListener('click', () => {
    document.getElementById('tourneeModal').classList.remove('open');
  });
  document.getElementById('tourneCancel').addEventListener('click', () => {
    document.getElementById('tourneeModal').classList.remove('open');
  });

  document.getElementById('tourneeForm').addEventListener('submit', e => {
    e.preventDefault();
    // TODO: appel POST /api/admin/tournees quand l'endpoint sera dispo
    showToast(t('cont_toast_tournee'), 'success');
    document.getElementById('tourneeModal').classList.remove('open');
  });

  document.getElementById('btnAddConteneur').addEventListener('click', () => {
    showToast(t('toast_coming_soon'), 'info');
  });
});
</script>
</body>
</html>
