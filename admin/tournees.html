<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="../brand_assets/Favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tournées | UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-truck" aria-hidden="true"></i>
      </div>
      <span data-i18n="tourn_title">Tournées de collecte</span>
    </h1>
    <p class="page-title-sub" data-i18n="tourn_subtitle">Planification et suivi des tournées de collecte</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-primary" id="btn-nouvelle-tournee">
      <i class="fa-solid fa-plus"></i> <span data-i18n="tourn_btn_new">Nouvelle tournée</span>
    </button>
  </div>
</div>

<!-- Stats rapides -->
<div class="stats-grid animate-in" style="animation-delay:.05s">
  <div class="stat-card">
    <div class="stat-icon teal"><i class="fa-solid fa-calendar-check"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-planifiees">—</div>
      <div class="stat-label" data-i18n="tourn_stat_planifiees">Planifiées</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green"><i class="fa-solid fa-truck-moving"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-en-cours">—</div>
      <div class="stat-label" data-i18n="tourn_stat_en_cours">En cours</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon blue"><i class="fa-solid fa-flag-checkered"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-terminees">—</div>
      <div class="stat-label" data-i18n="tourn_stat_terminees">Terminées</div>
    </div>
  </div>
</div>

<!-- Filtres -->
<section class="card animate-in" style="animation-delay:.1s">
  <div class="filter-row">
    <div class="filter-tabs" id="filtre-tournee-tabs" role="tablist">
      <button class="filter-tab active" role="tab" data-statut="" data-i18n="tourn_tab_all">Toutes</button>
      <button class="filter-tab" role="tab" data-statut="planifiee" data-i18n="tourn_tab_planifiee">Planifiées</button>
      <button class="filter-tab" role="tab" data-statut="en_cours" data-i18n="tourn_tab_en_cours">En cours</button>
      <button class="filter-tab" role="tab" data-statut="terminee" data-i18n="tourn_tab_terminee">Terminées</button>
    </div>
  </div>
</section>

<!-- Liste -->
<section class="card animate-in" style="animation-delay:.15s">
  <div class="card-header">
    <h2 class="card-title"><i class="fa-solid fa-route"></i> <span data-i18n="tourn_planning_title">Planning des tournées</span></h2>
  </div>
  <div id="tournees-list"><div class="loading-skeleton" style="height:140px;border-radius:8px"></div></div>
</section>

<!-- Modal nouvelle tournée -->
<div id="modal-tournee" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-tournee-titre">
  <div class="modal-content" style="max-width:480px">
    <div class="modal-header">
      <h3 id="modal-tournee-titre"><i class="fa-solid fa-truck"></i> <span data-i18n="tourn_modal_title">Nouvelle tournée</span></h3>
      <button class="modal-close" id="modal-tournee-close">&times;</button>
    </div>
    <form id="form-tournee" class="modal-body" novalidate>
      <div class="form-group">
        <label class="form-label" for="t-date"><span data-i18n="tourn_form_date">Date de tournée</span> <span class="required">*</span></label>
        <input type="date" id="t-date" class="form-control" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="t-conteneurs" data-i18n="tourn_form_conteneurs">Conteneurs à collecter</label>
        <input type="text" id="t-conteneurs" class="form-control" data-i18n-placeholder="tourn_form_conteneurs_ph" placeholder="Ex : C001, C002, C005"/>
        <small class="form-hint" data-i18n="tourn_form_conteneurs_hint">Identifiants séparés par des virgules</small>
      </div>
      <div class="form-group">
        <label class="form-label" for="t-note" data-i18n="tourn_form_note">Note / instructions</label>
        <textarea id="t-note" class="form-control" rows="3" data-i18n-placeholder="tourn_form_note_ph" placeholder="Instructions pour le chauffeur…"></textarea>
      </div>
      <p id="t-error" class="form-error" style="display:none"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="btn-t-annuler" data-i18n="btn_cancel">Annuler</button>
        <button type="submit" class="btn btn-primary" id="btn-t-submit">
          <i class="fa-solid fa-plus"></i> <span data-i18n="tourn_btn_creer">Créer la tournée</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script src="js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const utilisateur = await initLayout('tournees');
  if (!utilisateur) return;

  chargerTournees('');

  document.getElementById('btn-nouvelle-tournee').addEventListener('click', () => ouvrirModal());
  document.getElementById('modal-tournee-close').addEventListener('click', fermerModal);
  document.getElementById('btn-t-annuler').addEventListener('click', fermerModal);
  document.getElementById('modal-tournee').addEventListener('click', e => {
    if (e.target === e.currentTarget) fermerModal();
  });
  document.getElementById('form-tournee').addEventListener('submit', creerTournee);

  document.getElementById('filtre-tournee-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('#filtre-tournee-tabs .filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    chargerTournees(tab.dataset.statut);
  });
});

async function chargerTournees(statut) {
  const el = document.getElementById('tournees-list');
  el.innerHTML = '<div class="loading-skeleton" style="height:140px;border-radius:8px"></div>';

  const qs = statut ? `?statut=${encodeURIComponent(statut)}` : '';
  const res = await apiFetch(`/admin/tournees${qs}`);
  if (!res || !res.ok) {
    el.innerHTML = `<p class="empty-state-msg"><i class="fa-solid fa-triangle-exclamation"></i> ${t('tourn_err_load')}</p>`;
    return;
  }
  const tournees = await res.json();

  const stats = { planifiee: 0, en_cours: 0, terminee: 0 };
  tournees.forEach(t => { if (stats[t.statut] !== undefined) stats[t.statut]++; });
  document.getElementById('stat-planifiees').textContent = stats.planifiee;
  document.getElementById('stat-en-cours').textContent   = stats.en_cours;
  document.getElementById('stat-terminees').textContent  = stats.terminee;

  if (!tournees.length) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><p>${t('tourn_empty')}${statut ? ' ' + t('tourn_empty_statut') : ''}</p></div>`;
    return;
  }

  const statutClass = { planifiee: 'badge-info', en_cours: 'badge-warning', terminee: 'badge-success' };
  const statutLabel = { planifiee: t('tourn_tab_planifiee'), en_cours: t('tourn_tab_en_cours'), terminee: t('tourn_tab_terminee') };

  el.innerHTML = `
    <table class="data-table">
      <thead><tr><th>${t('tourn_th_date')}</th><th>${t('tourn_th_statut')}</th><th>${t('tourn_th_conteneurs')}</th><th>${t('tourn_th_note')}</th><th>${t('tourn_th_creee')}</th></tr></thead>
      <tbody>
        ${tournees.map(t => `
          <tr>
            <td><strong>${t.date_tournee}</strong></td>
            <td><span class="badge ${statutClass[t.statut] || 'badge-neutral'}">${statutLabel[t.statut] || t.statut}</span></td>
            <td>${esc(t.conteneurs || '—')}</td>
            <td>${esc(t.note || '—')}</td>
            <td>${t.date_creation ? new Date(t.date_creation).toLocaleDateString('fr-FR') : '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function ouvrirModal() {
  document.getElementById('modal-tournee').style.display = 'flex';
  document.getElementById('t-date').focus();
}
function fermerModal() {
  document.getElementById('modal-tournee').style.display = 'none';
  document.getElementById('form-tournee').reset();
  afficherErreur('');
}

async function creerTournee(e) {
  e.preventDefault();
  const date      = document.getElementById('t-date').value;
  const conteneurs = document.getElementById('t-conteneurs').value.trim()
    .split(',').map(s => s.trim()).filter(Boolean);
  const note      = document.getElementById('t-note').value.trim();

  if (!date) { afficherErreur(t('tourn_err_date')); return; }

  const btn = document.getElementById('btn-t-submit');
  btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${t('tourn_creating')}`;

  const res = await apiFetch('/admin/tournees', {
    method: 'POST',
    body: JSON.stringify({ date_tournee: date, conteneurs, note }),
  });

  btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-plus"></i> ${t('tourn_btn_creer')}`;

  if (!res || !res.ok) { afficherErreur(t('tourn_err_create')); return; }
  fermerModal();
  showToast(t('tourn_toast_created'), 'success');
  chargerTournees(document.querySelector('#filtre-tournee-tabs .filter-tab.active')?.dataset.statut || '');
}

function afficherErreur(msg) {
  const el = document.getElementById('t-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
