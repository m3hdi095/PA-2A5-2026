<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturation | UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
      </div>
      <span data-i18n="factures_title">Facturation</span>
    </h1>
    <p class="page-title-sub" data-i18n="factures_subtitle">Suivi des revenus, factures et abonnements</p>
  </div>
  <div class="page-title-actions">
    <a href="users.html" class="btn btn-outline btn-sm">
      <i class="fa-solid fa-users" aria-hidden="true"></i>
      <span data-i18n="nav_users">Utilisateurs</span>
    </a>
    <button class="btn btn-outline btn-sm" id="exportBtn">
      <i class="fa-solid fa-download" aria-hidden="true"></i>
      <span data-i18n="btn_export_csv">Exporter CSV</span>
    </button>
    <button class="btn btn-outline btn-sm" id="pdfBtn" style="color:#c0392b;border-color:#c0392b">
      <i class="fa-solid fa-file-pdf" aria-hidden="true"></i>
      <span data-i18n="btn_rapport_pdf">Rapport PDF</span>
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="btn_new_facture">Nouvelle facture</span>
    </button>
  </div>
</div>

<!-- REVENUS SUMMARY -->
<div class="stats-row" style="margin-bottom:24px">
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--uc-teal-pale)">
    <div class="stat-icon"><i class="fa-solid fa-money-bill-wave" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label" data-i18n="factures_stat_revenus">Revenus total</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--orange-100)">
    <div class="stat-icon" style="background:var(--orange-100)"><i class="fa-solid fa-user-check" style="color:var(--uc-teal)" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-abo">—</div>
      <div class="stat-label" data-i18n="factures_stat_abo">Abonnements</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:#0288d1;--icon-bg:var(--info-bg)">
    <div class="stat-icon" style="background:var(--info-bg)"><i class="fa-solid fa-graduation-cap" style="color:var(--info)" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-form">—</div>
      <div class="stat-label" data-i18n="factures_stat_form">Formations</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:#d32f2f;--icon-bg:#ffebee">
    <div class="stat-icon" style="background:#ffebee"><i class="fa-solid fa-circle-exclamation" style="color:#d32f2f" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-impayees">—</div>
      <div class="stat-label" data-i18n="factures_stat_impayees">Impayées</div>
    </div>
    <span class="stat-trend trend-down" id="stat-nb-impayees"></span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-wrap">
    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    <input type="text" class="filter-input" id="searchInput" data-i18n-placeholder="factures_search" placeholder="Rechercher client, numéro..."/>
  </div>
  <select class="filter-select" id="typeFilter">
    <option value="" data-i18n="factures_filter_all_types">Tous les types</option>
    <option value="abonnement" data-i18n="factures_type_abo">Abonnement</option>
    <option value="transaction" data-i18n="factures_type_comm">Commission</option>
    <option value="evenement" data-i18n="factures_type_form">Formation</option>
    <option value="publicite" data-i18n="factures_type_pub">Publicité</option>
  </select>
  <select class="filter-select" id="statusFilter">
    <option value="" data-i18n="factures_filter_all_status">Tous les statuts</option>
    <option value="payee" data-i18n="factures_statut_paye">Payée</option>
    <option value="en_attente" data-i18n="factures_statut_attente">En attente</option>
    <option value="annulee" data-i18n="factures_statut_impaye">Annulée</option>
  </select>
</div>

<!-- TABLE -->
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="factures_th_num">N° Facture</th>
          <th data-i18n="factures_th_client">Client</th>
          <th data-i18n="factures_th_type">Type</th>
          <th data-i18n="factures_th_ht">HT</th>
          <th data-i18n="factures_th_tva">TVA 20%</th>
          <th data-i18n="factures_th_ttc">TTC</th>
          <th data-i18n="factures_th_date">Date</th>
          <th data-i18n="factures_th_statut">Statut</th>
          <th style="text-align:right" data-i18n="factures_th_actions">Actions</th>
        </tr>
      </thead>
      <tbody id="facturesBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination">
    <span class="page-info" id="pageInfo"></span>
  </div>
</div>

<!-- MODAL NOUVELLE FACTURE -->
<div class="modal-overlay" id="factureModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">
        <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
        <span data-i18n="btn_new_facture">Nouvelle facture</span>
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="factureForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><span data-i18n="form_type">Type</span> <span class="form-required">*</span></label>
            <select id="type" class="form-control">
              <option value="abonnement" data-i18n="factures_type_abo">Abonnement</option>
              <option value="transaction" data-i18n="factures_type_comm">Commission</option>
              <option value="evenement" data-i18n="factures_type_form">Formation</option>
              <option value="publicite" data-i18n="factures_type_pub">Publicité</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label"><span data-i18n="form_montant_ht">Montant HT (€)</span> <span class="form-required">*</span></label>
            <input type="number" step="0.01" min="0" id="montantHt" class="form-control" placeholder="25.00"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" data-i18n="form_tva_calc">TVA calculée</label>
            <input type="text" id="tvaCalc" class="form-control" readonly style="background:var(--neutral-50);color:var(--neutral-500)" placeholder="0.00 €"/>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="form_montant_ttc">Montant TTC</label>
            <input type="text" id="ttcCalc" class="form-control" readonly style="background:var(--uc-teal-pale);color:var(--uc-forest);font-weight:700" placeholder="0.00 €"/>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelBtn" data-i18n="btn_cancel">Annuler</button>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            <span data-i18n="btn_create_facture">Créer la facture</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js" data-page="factures"></script>
<script>
let allFactures = [];
let filtered    = [];
let page        = 1;
const perPage   = 7;

const STAT_COLORS = { payee:'badge-green', en_attente:'badge-orange', annulee:'badge-red' };

function typeLabel(type) {
  const keys = { abonnement:'factures_type_abo', transaction:'factures_type_comm', evenement:'factures_type_form', publicite:'factures_type_pub' };
  return t(keys[type] || 'factures_type_comm');
}
function statutLabel(statut) {
  const keys = { payee:'factures_statut_paye', en_attente:'factures_statut_attente', annulee:'factures_statut_impaye' };
  return t(keys[statut] || 'factures_statut_attente');
}

function fmt(n) { return Number(n || 0).toFixed(2).replace('.', ',') + ' €'; }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function renderTable() {
  const tbody  = document.getElementById('facturesBody');
  const start  = (page - 1) * perPage;
  const slice  = filtered.slice(start, start + perPage);
  const locale = typeof _lang !== 'undefined' && _lang === 'en' ? 'en-GB' : 'fr-FR';

  if (!slice.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--neutral-400)">Aucune facture</td></tr>';
  } else {
    const rows = slice.map(f => {
      const tvaMontant = (Number(f.tva) * Number(f.ht) / 100).toFixed(2).replace('.', ',') + ' €';
      const dateStr    = f.date ? new Date(f.date).toLocaleDateString(locale) : '—';
      const pdfLink    = f.pdf
        ? '<a class="btn btn-ghost btn-icon" href="' + serverBase + '/' + esc(f.pdf) + '" target="_blank" title="Télécharger PDF"><i class="fa-solid fa-download"></i></a>'
        : '';
      return '<tr>'
        + '<td><span style="font-family:Poppins,sans-serif;font-weight:600;font-size:13px;color:var(--neutral-900)">' + esc(f.num) + '</span></td>'
        + '<td class="td-primary">' + esc(f.client) + '</td>'
        + '<td><span class="badge badge-gray">' + typeLabel(f.type) + '</span></td>'
        + '<td style="color:var(--neutral-600)">' + fmt(f.ht) + '</td>'
        + '<td style="color:var(--neutral-400)">' + tvaMontant + '</td>'
        + '<td style="font-weight:700;color:var(--uc-green)">' + fmt(f.ttc) + '</td>'
        + '<td style="color:var(--neutral-500);font-size:12px">' + dateStr + '</td>'
        + '<td><span class="badge ' + (STAT_COLORS[f.statut] || 'badge-gray') + '">' + statutLabel(f.statut) + '</span></td>'
        + '<td><div class="cell-actions">' + pdfLink + '</div></td>'
        + '</tr>';
    });
    tbody.innerHTML = rows.join('');
  }

  const total = Math.ceil(filtered.length / perPage);
  const pag   = document.getElementById('pagination');
  if (filtered.length) {
    document.getElementById('pageInfo').textContent =
      (page - 1) * perPage + 1 + '-' + Math.min(page * perPage, filtered.length) + ' ' + t('pagination_sur') + ' ' + filtered.length;
  }
  pag.querySelectorAll('.page-btn').forEach(b => b.remove());
  for (let i = 1; i <= total; i++) {
    const btn = document.createElement('button');
    btn.className   = 'page-btn' + (i === page ? ' active' : '');
    btn.textContent = i;
    btn.addEventListener('click', () => { page = i; renderTable(); });
    pag.appendChild(btn);
  }
}

function afficherStats(stats) {
  document.getElementById('stat-total').textContent    = fmt(stats.total_mois);
  document.getElementById('stat-abo').textContent      = fmt(stats.abonnements);
  document.getElementById('stat-form').textContent     = fmt(stats.formations);
  document.getElementById('stat-impayees').textContent = fmt(stats.impayees);
  const nbEl = document.getElementById('stat-nb-impayees');
  if (nbEl && stats.nb_impayees > 0) nbEl.textContent = stats.nb_impayees + ' factures';
}

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const stat = document.getElementById('statusFilter').value;
  filtered = allFactures.filter(f =>
    (esc(f.client).toLowerCase().includes(q) || esc(f.num).toLowerCase().includes(q)) &&
    (type === '' || f.type === type) &&
    (stat === '' || f.statut === stat)
  );
  page = 1;
  renderTable();
}

document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('factures');

  try {
    const res = await apiFetch('/admin/factures');
    if (res && res.ok) {
      const data = await res.json();
      if (Array.isArray(data.factures)) allFactures = data.factures;
      if (data.stats) afficherStats(data.stats);
    }
  } catch (e) { /* API non disponible */ }

  filtered = [...allFactures];
  renderTable();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);

  document.getElementById('montantHt').addEventListener('input', () => {
    const ht  = parseFloat(document.getElementById('montantHt').value) || 0;
    document.getElementById('tvaCalc').value = (ht * 0.20).toFixed(2) + ' €';
    document.getElementById('ttcCalc').value = (ht * 1.20).toFixed(2) + ' €';
  });

  const openModal  = () => document.getElementById('factureModal').classList.add('open');
  const closeModal = () => document.getElementById('factureModal').classList.remove('open');
  document.getElementById('btnAdd').addEventListener('click', openModal);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('factureModal').addEventListener('click', e => {
    if (e.target === document.getElementById('factureModal')) closeModal();
  });

  document.getElementById('factureForm').addEventListener('submit', e => {
    e.preventDefault();
    closeModal();
    showToast('Les factures sont générées automatiquement lors des paiements Stripe.', 'info');
  });

  document.getElementById('pdfBtn').addEventListener('click', async () => {
    if (!window.jspdf) {
      showToast('Chargement du générateur PDF...', 'info');
      await Promise.all([
        new Promise(res => { const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'; s.onload=res; document.head.appendChild(s); }),
        new Promise(res => { const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js'; s.onload=res; document.head.appendChild(s); }),
      ]);
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const locale = typeof _lang !== 'undefined' && _lang === 'en' ? 'en-GB' : 'fr-FR';
    const dateNow = new Date().toLocaleDateString(locale, { day:'numeric', month:'long', year:'numeric' });

    doc.setFillColor(45, 74, 62);
    doc.rect(0, 0, 297, 22, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('UpcycleConnect — Rapport financier', 14, 13);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Généré le ' + dateNow, 270, 13, { align: 'right' });

    const totalTTC = allFactures.reduce((s, f) => s + Number(f.ttc || 0), 0);
    const totalPayees = allFactures.filter(f => f.statut === 'payee').reduce((s, f) => s + Number(f.ttc || 0), 0);
    const nbImpayees = allFactures.filter(f => f.statut === 'en_attente').length;

    doc.setTextColor(60, 60, 60);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text(`Total TTC : ${totalTTC.toFixed(2)} €   |   Payées : ${totalPayees.toFixed(2)} €   |   En attente : ${nbImpayees} facture(s)`, 14, 30);

    const rows = allFactures.map(f => [
      f.num,
      f.client,
      typeLabel(f.type),
      Number(f.ht || 0).toFixed(2) + ' €',
      (Number(f.tva || 0) * Number(f.ht || 0) / 100).toFixed(2) + ' €',
      Number(f.ttc || 0).toFixed(2) + ' €',
      f.date ? new Date(f.date).toLocaleDateString(locale) : '—',
      statutLabel(f.statut),
    ]);

    doc.autoTable({
      startY: 35,
      head: [['N° Facture', 'Client', 'Type', 'HT', 'TVA 20%', 'TTC', 'Date', 'Statut']],
      body: rows,
      styles: { fontSize: 8, cellPadding: 3 },
      headStyles: { fillColor: [45, 74, 62], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [245, 248, 246] },
      columnStyles: { 5: { fontStyle: 'bold', textColor: [45, 74, 62] } },
    });

    doc.save('rapport-financier-upcycleconnect.pdf');
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const rows = [['N°', 'Client', 'Type', 'HT', 'TVA', 'TTC', 'Date', 'Statut']];
    allFactures.forEach(f => rows.push([
      f.num, f.client, f.type, f.ht,
      (Number(f.tva) * Number(f.ht) / 100).toFixed(2),
      f.ttc, f.date, f.statut
    ]));
    const csv = rows.map(r => r.join(',')).join('\n');
    const a   = document.createElement('a');
    a.href     = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);
    a.download = 'factures.csv';
    a.click();
  });
});
</script>
</body>
</html>
