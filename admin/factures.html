<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturation | UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
      </div>
      <span data-i18n="factures_title">Facturation</span>
    </h1>
    <p class="page-title-sub" data-i18n="factures_subtitle">Suivi des revenus, factures et abonnements</p>
  </div>
  <div class="page-title-actions">
    <a href="users.html" class="btn btn-outline btn-sm">
      <i class="fa-solid fa-users" aria-hidden="true"></i>
      <span data-i18n="nav_users">Utilisateurs</span>
    </a>
    <button class="btn btn-outline btn-sm" id="exportBtn">
      <i class="fa-solid fa-download" aria-hidden="true"></i>
      <span data-i18n="btn_export_csv">Exporter CSV</span>
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="btn_new_facture">Nouvelle facture</span>
    </button>
  </div>
</div>

<!-- REVENUS SUMMARY -->
<div class="stats-row" style="margin-bottom:24px">
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--uc-teal-pale)">
    <div class="stat-icon"><i class="fa-solid fa-money-bill-wave" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value">18 490 €</div>
      <div class="stat-label" data-i18n="factures_stat_revenus">Revenus mars 2026</div>
    </div>
    <span class="stat-trend trend-up">+22%</span>
  </div>
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--orange-100)">
    <div class="stat-icon" style="background:var(--orange-100)"><i class="fa-solid fa-user-check" style="color:var(--uc-teal)" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value">8 240 €</div>
      <div class="stat-label" data-i18n="factures_stat_abo">Abonnements</div>
    </div>
    <span class="stat-trend trend-up">+5%</span>
  </div>
  <div class="stat-card" style="--accent:#0288d1;--icon-bg:var(--info-bg)">
    <div class="stat-icon" style="background:var(--info-bg)"><i class="fa-solid fa-graduation-cap" style="color:var(--info)" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value">4 600 €</div>
      <div class="stat-label" data-i18n="factures_stat_form">Formations</div>
    </div>
    <span class="stat-trend trend-up">+18%</span>
  </div>
  <div class="stat-card" style="--accent:#d32f2f;--icon-bg:#ffebee">
    <div class="stat-icon" style="background:#ffebee"><i class="fa-solid fa-circle-exclamation" style="color:#d32f2f" aria-hidden="true"></i></div>
    <div class="stat-info">
      <div class="stat-value">1 240 €</div>
      <div class="stat-label" data-i18n="factures_stat_impayees">Impayées</div>
    </div>
    <span class="stat-trend trend-down">3 factures</span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-wrap">
    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    <input type="text" class="filter-input" id="searchInput" data-i18n-placeholder="factures_search" placeholder="Rechercher client, numéro..."/>
  </div>
  <select class="filter-select" id="typeFilter">
    <option value="" data-i18n="factures_filter_all_types">Tous les types</option>
    <option value="abonnement" data-i18n="factures_type_abo">Abonnement</option>
    <option value="commission" data-i18n="factures_type_comm">Commission</option>
    <option value="formation" data-i18n="factures_type_form">Formation</option>
    <option value="publicite" data-i18n="factures_type_pub">Publicité</option>
  </select>
  <select class="filter-select" id="statusFilter">
    <option value="" data-i18n="factures_filter_all_status">Tous les statuts</option>
    <option value="payée" data-i18n="factures_statut_paye">Payée</option>
    <option value="en_attente" data-i18n="factures_statut_attente">En attente</option>
    <option value="impayée" data-i18n="factures_statut_impaye">Impayée</option>
  </select>
</div>

<!-- TABLE -->
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="factures_th_num">N° Facture</th>
          <th data-i18n="factures_th_client">Client</th>
          <th data-i18n="factures_th_type">Type</th>
          <th data-i18n="factures_th_ht">HT</th>
          <th data-i18n="factures_th_tva">TVA 20%</th>
          <th data-i18n="factures_th_ttc">TTC</th>
          <th data-i18n="factures_th_date">Date</th>
          <th data-i18n="factures_th_statut">Statut</th>
          <th style="text-align:right" data-i18n="factures_th_actions">Actions</th>
        </tr>
      </thead>
      <tbody id="facturesBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination">
    <span class="page-info" id="pageInfo"></span>
  </div>
</div>

<!-- MODAL NOUVELLE FACTURE -->
<div class="modal-overlay" id="factureModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">
        <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
        <span data-i18n="btn_new_facture">Nouvelle facture</span>
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="factureForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><span data-i18n="form_client">Client</span> <span class="form-required">*</span></label>
            <select id="client" class="form-control">
              <option value="">Choisir</option>
              <option>Marie Dupont</option>
              <option>Jean-Paul Lévy</option>
              <option>Clara Noel</option>
              <option>Henri Petit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label"><span data-i18n="form_type">Type</span> <span class="form-required">*</span></label>
            <select id="type" class="form-control">
              <option value="abonnement" data-i18n="factures_type_abo">Abonnement</option>
              <option value="commission" data-i18n="factures_type_comm">Commission</option>
              <option value="formation" data-i18n="factures_type_form">Formation</option>
              <option value="publicite" data-i18n="factures_type_pub">Publicité</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><span data-i18n="form_montant_ht">Montant HT (€)</span> <span class="form-required">*</span></label>
            <input type="number" step="0.01" min="0" id="montantHt" class="form-control" placeholder="25.00"/>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="form_tva_calc">TVA calculée</label>
            <input type="text" id="tvaCalc" class="form-control" readonly style="background:var(--neutral-50);color:var(--neutral-500)" placeholder="0.00 €"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="form_montant_ttc">Montant TTC</label>
          <input type="text" id="ttcCalc" class="form-control" readonly style="background:var(--uc-teal-pale);color:var(--uc-forest);font-weight:700" placeholder="0.00 €"/>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelBtn" data-i18n="btn_cancel">Annuler</button>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            <span data-i18n="btn_create_facture">Créer la facture</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js" data-page="factures"></script>
<script>
let MOCK_FACTURES = [];

const STAT_COLORS = { 'payée':'badge-green', 'en_attente':'badge-orange', 'impayée':'badge-red' };

function typeLabel(type) {
  const keys = { abonnement:'factures_type_abo', commission:'factures_type_comm', formation:'factures_type_form', publicite:'factures_type_pub' };
  return t(keys[type] || 'factures_type_comm');
}
function statutLabel(statut) {
  const keys = { 'payée':'factures_statut_paye', 'en_attente':'factures_statut_attente', 'impayée':'factures_statut_impaye' };
  return t(keys[statut] || 'factures_statut_attente');
}

let filtered = [...MOCK_FACTURES];
let page = 1;
const perPage = 7;

function fmt(n) { return n.toFixed(2).replace('.',',') + ' €'; }

function renderTable() {
  const tbody = document.getElementById('facturesBody');
  const start = (page-1)*perPage;
  const slice = filtered.slice(start, start+perPage);

  const locale = _lang === 'en' ? 'en-GB' : 'fr-FR';
  tbody.innerHTML = slice.map(f => `
    <tr>
      <td><span style="font-family:Poppins,sans-serif;font-weight:600;font-size:13px;color:var(--neutral-900)">${f.num}</span></td>
      <td class="td-primary">${f.client}</td>
      <td><span class="badge badge-gray">${typeLabel(f.type)}</span></td>
      <td style="color:var(--neutral-600)">${fmt(f.ht)}</td>
      <td style="color:var(--neutral-400)">${fmt(f.tva)}</td>
      <td style="font-weight:700;color:var(--uc-green)">${fmt(f.ttc)}</td>
      <td style="color:var(--neutral-500);font-size:12px">${new Date(f.date).toLocaleDateString(locale)}</td>
      <td><span class="badge ${STAT_COLORS[f.statut]}">${statutLabel(f.statut)}</span></td>
      <td>
        <div class="cell-actions">
          <button class="btn btn-ghost btn-icon" title="${t('factures_tooltip_download')}" onclick="downloadPdf('${f.num}')">
            <i class="fa-solid fa-download" aria-hidden="true"></i>
          </button>
          ${f.statut==='en_attente'||f.statut==='impayée' ? `
          <button class="btn btn-ghost btn-icon" title="${t('factures_tooltip_mark_paid')}" onclick="markPaid(${f.id})" style="color:var(--uc-green)">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
          </button>` : ''}
          <button class="btn btn-ghost btn-icon" title="${t('btn_supprimer')}" onclick="deleteFact(${f.id})" style="color:var(--danger)">
            <i class="fa-solid fa-trash" aria-hidden="true"></i>
          </button>
        </div>
      </td>
    </tr>
  `).join('');

  // Pagination
  const total = Math.ceil(filtered.length/perPage);
  const pag   = document.getElementById('pagination');
  document.getElementById('pageInfo').textContent = `${(page-1)*perPage+1}-${Math.min(page*perPage,filtered.length)} ${t('pagination_sur')} ${filtered.length}`;
  pag.querySelectorAll('.page-btn').forEach(b=>b.remove());
  for (let i=1;i<=total;i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn'+(i===page?' active':'');
    btn.textContent = i;
    btn.addEventListener('click',()=>{page=i;renderTable();});
    pag.appendChild(btn);
  }
}

window.downloadPdf = num => showToast(`PDF ${num} : ${t('factures_toast_pdf')}`, 'success');
window.markPaid = id => {
  const f = MOCK_FACTURES.find(f=>f.id===id);
  if (f) { f.statut='payée'; filtered=[...MOCK_FACTURES]; renderTable(); showToast(t('factures_toast_mark_paid'), 'success'); }
};
window.deleteFact = id => {
  if (!confirm(t('confirm_action'))) return;
  const i = MOCK_FACTURES.findIndex(f=>f.id===id);
  MOCK_FACTURES.splice(i,1);
  filtered = filtered.filter(f=>f.id!==id);
  renderTable();
  showToast(t('factures_toast_deleted'), 'error');
};

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const stat = document.getElementById('statusFilter').value;
  filtered = MOCK_FACTURES.filter(f =>
    (f.client.toLowerCase().includes(q) || f.num.toLowerCase().includes(q)) &&
    (type===''||f.type===type) && (stat===''||f.statut===stat)
  );
  page=1; renderTable();
}

document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('factures');

  try {
    const res = await apiFetch('/admin/factures');
    if (res?.ok) {
      const data = await res.json();
      if (Array.isArray(data)) MOCK_FACTURES = data;
    }
  } catch {}
  filtered = [...MOCK_FACTURES];
  renderTable();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);

  // TVA auto-calc
  document.getElementById('montantHt').addEventListener('input', () => {
    const ht  = parseFloat(document.getElementById('montantHt').value) || 0;
    const tva = ht * 0.20;
    document.getElementById('tvaCalc').value = tva.toFixed(2) + ' €';
    document.getElementById('ttcCalc').value = (ht + tva).toFixed(2) + ' €';
  });

  const openModal  = () => document.getElementById('factureModal').classList.add('open');
  const closeModal = () => document.getElementById('factureModal').classList.remove('open');
  document.getElementById('btnAdd').addEventListener('click', openModal);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('factureModal').addEventListener('click', e => {
    if (e.target===document.getElementById('factureModal')) closeModal();
  });

  document.getElementById('factureForm').addEventListener('submit', e => {
    e.preventDefault();
    const ht  = parseFloat(document.getElementById('montantHt').value)||0;
    const tva = +(ht*0.20).toFixed(2);
    const num = 'F-2026-' + String(MOCK_FACTURES.length+1).padStart(4,'0');
    MOCK_FACTURES.unshift({ id:Date.now(), num, client:document.getElementById('client').value, type:document.getElementById('type').value, ht, tva, ttc:+(ht+tva).toFixed(2), date:new Date().toISOString().slice(0,10), statut:'en_attente' });
    filtered=[...MOCK_FACTURES]; renderTable();
    closeModal(); showToast(`${t('factures_toast_created')} ${num}`, 'success');
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const rows = [['N°','Client','Type','HT','TVA','TTC','Date','Statut']];
    MOCK_FACTURES.forEach(f=>rows.push([f.num,f.client,f.type,f.ht,f.tva,f.ttc,f.date,f.statut]));
    const csv = rows.map(r=>r.join(',')).join('\n');
    const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv); a.download='factures.csv'; a.click();
  });
});
</script>
</body>
</html>
