<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturation — UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      </div>
      Facturation
    </h1>
    <p class="page-title-sub">Suivi des revenus, factures et abonnements</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-outline btn-sm" id="exportBtn">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Exporter CSV
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Nouvelle facture
    </button>
  </div>
</div>

<!-- REVENUS SUMMARY -->
<div class="stats-row" style="margin-bottom:24px">
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--uc-teal-pale)">
    <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
    <div class="stat-info">
      <div class="stat-value">18 490 €</div>
      <div class="stat-label">Revenus mars 2026</div>
    </div>
    <span class="stat-trend trend-up">+22%</span>
  </div>
  <div class="stat-card" style="--accent:var(--uc-teal);--icon-bg:var(--orange-100)">
    <div class="stat-icon" style="background:var(--orange-100)"><svg viewBox="0 0 24 24" style="fill:var(--uc-teal)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></div>
    <div class="stat-info">
      <div class="stat-value">8 240 €</div>
      <div class="stat-label">Abonnements</div>
    </div>
    <span class="stat-trend trend-up">+5%</span>
  </div>
  <div class="stat-card" style="--accent:#0288d1;--icon-bg:var(--info-bg)">
    <div class="stat-icon" style="background:var(--info-bg)"><svg viewBox="0 0 24 24" style="fill:var(--info)"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></div>
    <div class="stat-info">
      <div class="stat-value">4 600 €</div>
      <div class="stat-label">Formations</div>
    </div>
    <span class="stat-trend trend-up">+18%</span>
  </div>
  <div class="stat-card" style="--accent:#d32f2f;--icon-bg:#ffebee">
    <div class="stat-icon" style="background:#ffebee"><svg viewBox="0 0 24 24" style="fill:#d32f2f"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div>
    <div class="stat-info">
      <div class="stat-value">1 240 €</div>
      <div class="stat-label">Impayées</div>
    </div>
    <span class="stat-trend trend-down">3 factures</span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-wrap">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" class="filter-input" id="searchInput" placeholder="Rechercher client, numéro..."/>
  </div>
  <select class="filter-select" id="typeFilter">
    <option value="">Tous les types</option>
    <option value="abonnement">Abonnement</option>
    <option value="commission">Commission</option>
    <option value="formation">Formation</option>
    <option value="publicite">Publicité</option>
  </select>
  <select class="filter-select" id="statusFilter">
    <option value="">Tous les statuts</option>
    <option value="payée">Payée</option>
    <option value="en_attente">En attente</option>
    <option value="impayée">Impayée</option>
  </select>
</div>

<!-- TABLE -->
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>N° Facture</th>
          <th>Client</th>
          <th>Type</th>
          <th>HT</th>
          <th>TVA 20%</th>
          <th>TTC</th>
          <th>Date</th>
          <th>Statut</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="facturesBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination">
    <span class="page-info" id="pageInfo"></span>
  </div>
</div>

<!-- MODAL NOUVELLE FACTURE -->
<div class="modal-overlay" id="factureModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        Nouvelle facture
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="factureForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Client <span class="form-required">*</span></label>
            <select id="client" class="form-control">
              <option value="">— Choisir —</option>
              <option>Marie Dupont</option>
              <option>Jean-Paul Lévy</option>
              <option>Clara Noel</option>
              <option>Henri Petit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Type <span class="form-required">*</span></label>
            <select id="type" class="form-control">
              <option value="abonnement">Abonnement</option>
              <option value="commission">Commission</option>
              <option value="formation">Formation</option>
              <option value="publicite">Publicité</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Montant HT (€) <span class="form-required">*</span></label>
            <input type="number" step="0.01" min="0" id="montantHt" class="form-control" placeholder="25.00"/>
          </div>
          <div class="form-group">
            <label class="form-label">TVA calculée</label>
            <input type="text" id="tvaCalc" class="form-control" readonly style="background:var(--neutral-50);color:var(--neutral-500)" placeholder="0.00 €"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Montant TTC</label>
          <input type="text" id="ttcCalc" class="form-control" readonly style="background:var(--uc-teal-pale);color:var(--uc-forest);font-weight:700" placeholder="0.00 €"/>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelBtn">Annuler</button>
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Créer la facture
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js" data-page="factures"></script>
<script>
const MOCK_FACTURES = [
  { id:1, num:'F-2026-0042', client:'Jean-Paul Lévy',  type:'abonnement', ht:25.00,  tva:5.00,   ttc:30.00,  date:'2026-03-01', statut:'payée' },
  { id:2, num:'F-2026-0041', client:'Clara Noel',      type:'abonnement', ht:25.00,  tva:5.00,   ttc:30.00,  date:'2026-03-01', statut:'payée' },
  { id:3, num:'F-2026-0040', client:'Marie Dupont',    type:'formation',  ht:37.50,  tva:7.50,   ttc:45.00,  date:'2026-02-28', statut:'payée' },
  { id:4, num:'F-2026-0039', client:'Henri Petit',     type:'commission', ht:10.42,  tva:2.08,   ttc:12.50,  date:'2026-02-25', statut:'en_attente' },
  { id:5, num:'F-2026-0038', client:'Marc Leclerc',    type:'abonnement', ht:25.00,  tva:5.00,   ttc:30.00,  date:'2026-02-20', statut:'impayée' },
  { id:6, num:'F-2026-0037', client:'Amina Diallo',    type:'formation',  ht:29.17,  tva:5.83,   ttc:35.00,  date:'2026-02-15', statut:'payée' },
  { id:7, num:'F-2026-0036', client:'Henri Petit',     type:'publicite',  ht:250.00, tva:50.00,  ttc:300.00, date:'2026-02-10', statut:'payée' },
  { id:8, num:'F-2026-0035', client:'Clara Noel',      type:'publicite',  ht:416.67, tva:83.33,  ttc:500.00, date:'2026-02-05', statut:'impayée' },
  { id:9, num:'F-2026-0034', client:'Jean-Paul Lévy',  type:'commission', ht:20.83,  tva:4.17,   ttc:25.00,  date:'2026-02-01', statut:'payée' },
];

const STAT_COLORS = { 'payée':'badge-green', 'en_attente':'badge-orange', 'impayée':'badge-red' };

let filtered = [...MOCK_FACTURES];
let page = 1;
const perPage = 7;

function fmt(n) { return n.toFixed(2).replace('.',',') + ' €'; }

function renderTable() {
  const tbody = document.getElementById('facturesBody');
  const start = (page-1)*perPage;
  const slice = filtered.slice(start, start+perPage);

  tbody.innerHTML = slice.map(f => `
    <tr>
      <td><span style="font-family:Poppins,sans-serif;font-weight:600;font-size:13px;color:var(--neutral-900)">${f.num}</span></td>
      <td class="td-primary">${f.client}</td>
      <td><span class="badge badge-gray">${f.type}</span></td>
      <td style="color:var(--neutral-600)">${fmt(f.ht)}</td>
      <td style="color:var(--neutral-400)">${fmt(f.tva)}</td>
      <td style="font-weight:700;color:var(--uc-green)">${fmt(f.ttc)}</td>
      <td style="color:var(--neutral-500);font-size:12px">${new Date(f.date).toLocaleDateString('fr-FR')}</td>
      <td><span class="badge ${STAT_COLORS[f.statut]}">${f.statut}</span></td>
      <td>
        <div class="cell-actions">
          <button class="btn btn-ghost btn-icon" title="Télécharger PDF" onclick="downloadPdf('${f.num}')">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          ${f.statut==='en_attente'||f.statut==='impayée' ? `
          <button class="btn btn-ghost btn-icon" title="Marquer payée" onclick="markPaid(${f.id})" style="color:var(--uc-green)">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </button>` : ''}
          <button class="btn btn-ghost btn-icon" title="Supprimer" onclick="deleteFact(${f.id})" style="color:var(--danger)">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join('');

  // Pagination
  const total = Math.ceil(filtered.length/perPage);
  const pag   = document.getElementById('pagination');
  document.getElementById('pageInfo').textContent = `${(page-1)*perPage+1}–${Math.min(page*perPage,filtered.length)} sur ${filtered.length}`;
  pag.querySelectorAll('.page-btn').forEach(b=>b.remove());
  for (let i=1;i<=total;i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn'+(i===page?' active':'');
    btn.textContent = i;
    btn.addEventListener('click',()=>{page=i;renderTable();});
    pag.appendChild(btn);
  }
}

window.downloadPdf = num => showToast(`PDF ${num} généré`, 'success');
window.markPaid = id => {
  const f = MOCK_FACTURES.find(f=>f.id===id);
  if (f) { f.statut='payée'; filtered=[...MOCK_FACTURES]; renderTable(); showToast('Facture marquée payée', 'success'); }
};
window.deleteFact = id => {
  if (!confirm('Supprimer cette facture ?')) return;
  const i = MOCK_FACTURES.findIndex(f=>f.id===id);
  MOCK_FACTURES.splice(i,1);
  filtered = filtered.filter(f=>f.id!==id);
  renderTable();
  showToast('Facture supprimée', 'error');
};

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const t = document.getElementById('typeFilter').value;
  const s = document.getElementById('statusFilter').value;
  filtered = MOCK_FACTURES.filter(f =>
    (f.client.toLowerCase().includes(q) || f.num.toLowerCase().includes(q)) &&
    (t===''||f.type===t) && (s===''||f.statut===s)
  );
  page=1; renderTable();
}

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  renderTable();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);

  // TVA auto-calc
  document.getElementById('montantHt').addEventListener('input', () => {
    const ht  = parseFloat(document.getElementById('montantHt').value) || 0;
    const tva = ht * 0.20;
    document.getElementById('tvaCalc').value = tva.toFixed(2) + ' €';
    document.getElementById('ttcCalc').value = (ht + tva).toFixed(2) + ' €';
  });

  const openModal  = () => document.getElementById('factureModal').classList.add('open');
  const closeModal = () => document.getElementById('factureModal').classList.remove('open');
  document.getElementById('btnAdd').addEventListener('click', openModal);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('factureModal').addEventListener('click', e => {
    if (e.target===document.getElementById('factureModal')) closeModal();
  });

  document.getElementById('factureForm').addEventListener('submit', e => {
    e.preventDefault();
    const ht  = parseFloat(document.getElementById('montantHt').value)||0;
    const tva = +(ht*0.20).toFixed(2);
    const num = 'F-2026-' + String(MOCK_FACTURES.length+1).padStart(4,'0');
    MOCK_FACTURES.unshift({ id:Date.now(), num, client:document.getElementById('client').value, type:document.getElementById('type').value, ht, tva, ttc:+(ht+tva).toFixed(2), date:new Date().toISOString().slice(0,10), statut:'en_attente' });
    filtered=[...MOCK_FACTURES]; renderTable();
    closeModal(); showToast(`Facture ${num} créée`, 'success');
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const rows = [['N°','Client','Type','HT','TVA','TTC','Date','Statut']];
    MOCK_FACTURES.forEach(f=>rows.push([f.num,f.client,f.type,f.ht,f.tva,f.ttc,f.date,f.statut]));
    const csv = rows.map(r=>r.join(',')).join('\n');
    const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv); a.download='factures.csv'; a.click();
  });
});
</script>
</body>
</html>
