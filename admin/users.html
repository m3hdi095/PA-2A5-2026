<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utilisateurs — UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
      Utilisateurs
    </h1>
    <p class="page-title-sub">Gérer les comptes particuliers, professionnels et salariés</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-primary" id="btnAdd">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Ajouter
    </button>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-wrap">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" class="filter-input" id="searchInput" placeholder="Rechercher nom ou email..."/>
  </div>
  <select class="filter-select" id="roleFilter">
    <option value="">Tous les rôles</option>
    <option value="particulier">Particulier</option>
    <option value="professionnel">Professionnel</option>
    <option value="salarie">Salarié</option>
    <option value="admin">Admin</option>
  </select>
  <select class="filter-select" id="statusFilter">
    <option value="">Tous les statuts</option>
    <option value="actif">Actif</option>
    <option value="inactif">Inactif</option>
    <option value="suspendu">Suspendu</option>
  </select>
  <button class="btn btn-outline btn-sm" id="exportBtn">
    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    Exporter
  </button>
</div>

<!-- TABLE -->
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Utilisateur</th>
          <th>Rôle</th>
          <th>Statut</th>
          <th>Score UC</th>
          <th>Inscrit le</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--neutral-300)">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination">
    <span class="page-info" id="pageInfo"></span>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="userModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Ajouter un utilisateur
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="userForm" novalidate>
        <input type="hidden" id="userId"/>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nom complet <span class="form-required">*</span></label>
            <input type="text" id="nom" class="form-control" placeholder="Jean Dupont" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email <span class="form-required">*</span></label>
            <input type="email" id="email" class="form-control" placeholder="jean@mail.fr" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Rôle <span class="form-required">*</span></label>
            <select id="role" class="form-control">
              <option value="particulier">Particulier</option>
              <option value="professionnel">Professionnel</option>
              <option value="salarie">Salarié</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Statut</label>
            <select id="statut" class="form-control">
              <option value="actif">Actif</option>
              <option value="inactif">Inactif</option>
              <option value="suspendu">Suspendu</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Téléphone</label>
            <input type="tel" id="telephone" class="form-control" placeholder="06 00 00 00 00"/>
          </div>
          <div class="form-group" id="passGroup">
            <label class="form-label">Mot de passe <span class="form-required">*</span></label>
            <input type="password" id="password" class="form-control" placeholder="••••••••"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Adresse</label>
          <input type="text" id="adresse" class="form-control" placeholder="1 rue de la Paix, Paris"/>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelBtn">Annuler</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js" data-page="users"></script>
<script src="js/users.js"></script>
</body>
</html>
