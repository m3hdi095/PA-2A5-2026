<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications | UpcycleConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Montserrat:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .notif-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      align-items: start;
    }
    /* Aperçu téléphone */
    .phone-preview {
      background: var(--neutral-900);
      border-radius: 32px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(45,74,62,0.25);
      width: 260px;
      margin: 0 auto;
    }
    .phone-screen {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 20px 14px 16px;
      min-height: 340px;
    }
    .phone-status {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
      font-family: 'Roboto', monospace;
    }
    .phone-notif {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(4px);
    }
    .phone-notif-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .phone-notif-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--uc-teal);
      display: flex; align-items: center; justify-content: center;
    }
    .phone-notif-icon i { font-size: 13px; color: #fff; }
    .phone-notif-app  { font-size: 10px; color: rgba(255,255,255,0.4); }
    .phone-notif-time { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: auto; }
    .phone-notif-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; font-family: 'Montserrat', sans-serif; }
    .phone-notif-body  { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.5; }

    /* Segments */
    .segment-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .segment-btn {
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 2px solid var(--neutral-200);
      background: var(--white);
      font-size: 13px;
      font-weight: 600;
      color: var(--neutral-500);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .segment-btn.active {
      border-color: var(--uc-teal);
      background: var(--uc-teal-pale);
      color: var(--uc-forest);
    }
    .segment-btn i { font-size: 14px; }

    /* Historique */
    .notif-hist-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--neutral-100);
    }
    .notif-hist-item:last-child { border-bottom: none; }
    .notif-hist-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--uc-green-pale);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .notif-hist-icon i { font-size: 14px; color: var(--uc-forest); }
    .notif-hist-titre { font-weight: 600; font-size: 13px; color: var(--neutral-900); }
    .notif-hist-meta  { font-size: 11px; color: var(--neutral-400); margin-top: 2px; }
    .notif-hist-stats { margin-left: auto; text-align: right; flex-shrink: 0; }
    .notif-hist-envoyes { font-size: 13px; font-weight: 700; color: var(--uc-forest); }
    .notif-hist-date    { font-size: 11px; color: var(--neutral-300); }

    @media (max-width: 900px) {
      .notif-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page-title-row">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-bell" aria-hidden="true"></i>
      </div>
      <span data-i18n="notif_page_title">Notifications push</span>
    </h1>
    <p class="page-title-sub" data-i18n="notif_page_subtitle">Envoi de notifications via OneSignal aux utilisateurs de la plateforme</p>
  </div>
</div>

<div class="notif-layout">

  <!-- Colonne gauche : formulaire + historique -->
  <div style="display:flex;flex-direction:column;gap:20px">

    <!-- Formulaire envoi -->
    <div class="card">
      <div class="card-header">
        <h2>
          <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
          <span data-i18n="notif_new_title">Nouvelle notification</span>
        </h2>
      </div>
      <div class="card-body">
        <form id="formNotif">

          <!-- Audience -->
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label" data-i18n="notif_audience">Audience</label>
            <div class="segment-grid">
              <button type="button" class="segment-btn active" data-segment="tous">
                <i class="fa-solid fa-globe"></i> <span data-i18n="notif_seg_tous">Tous les utilisateurs</span>
              </button>
              <button type="button" class="segment-btn" data-segment="particulier">
                <i class="fa-solid fa-user"></i> <span data-i18n="notif_seg_particulier">Particuliers</span>
              </button>
              <button type="button" class="segment-btn" data-segment="professionnel">
                <i class="fa-solid fa-briefcase"></i> <span data-i18n="notif_seg_professionnel">Professionnels</span>
              </button>
              <button type="button" class="segment-btn" data-segment="salarie">
                <i class="fa-solid fa-id-badge"></i> <span data-i18n="notif_seg_salarie">Salariés</span>
              </button>
            </div>
            <input type="hidden" id="segmentValue" value="tous"/>
          </div>

          <div class="form-group">
            <label class="form-label" for="notifTitre">
              <i class="fa-solid fa-heading" aria-hidden="true"></i>
              <span data-i18n="notif_titre">Titre</span> <span style="color:var(--danger)">*</span>
            </label>
            <input type="text" id="notifTitre" class="form-control" placeholder="Ex: Nouvelle prestation disponible !"
              maxlength="60" required oninput="updatePreview()"/>
            <div style="text-align:right;font-size:11px;color:var(--neutral-300);margin-top:2px">
              <span id="titreCpt">0</span>/60
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="notifMessage">
              <i class="fa-solid fa-align-left" aria-hidden="true"></i>
              <span data-i18n="notif_contenu">Message</span> <span style="color:var(--danger)">*</span>
            </label>
            <textarea id="notifMessage" class="form-control" rows="4"
              placeholder="Rédigez votre message ici..." maxlength="140" required
              oninput="updatePreview()"></textarea>
            <div style="text-align:right;font-size:11px;color:var(--neutral-300);margin-top:2px">
              <span id="messageCpt">0</span>/140
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="notifUrl">
              <i class="fa-solid fa-link" aria-hidden="true"></i>
              <span data-i18n="notif_url">URL de redirection</span> <span style="color:var(--neutral-300);font-weight:400" data-i18n="notif_url_optional">(optionnel)</span>
            </label>
            <input type="url" id="notifUrl" class="form-control" placeholder="https://upcycleconnect.com/..."/>
          </div>

          <div id="notifError" style="display:none;background:var(--danger-bg);color:var(--danger);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px"></div>

          <div style="display:flex;justify-content:flex-end;gap:10px">
            <button type="button" class="btn btn-ghost btn-sm" onclick="resetForm()">
              <i class="fa-solid fa-rotate-left"></i> <span data-i18n="btn_reinitialiser">Réinitialiser</span>
            </button>
            <button type="submit" class="btn btn-primary btn-sm" id="btnEnvoyer">
              <i class="fa-solid fa-paper-plane"></i> <span data-i18n="btn_envoyer">Envoyer</span>
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Historique -->
    <div class="card">
      <div class="card-header">
        <h2>
          <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
          <span data-i18n="notif_historique_title">Historique des envois</span>
        </h2>
      </div>
      <div class="card-body" id="historiqueNotifs"></div>
    </div>

  </div>

  <!-- Colonne droite : prévisualisation -->
  <div>
    <div class="card" style="position:sticky;top:84px">
      <div class="card-header">
        <h2>
          <i class="fa-solid fa-mobile-screen" aria-hidden="true"></i>
          <span data-i18n="notif_apercu_title">Aperçu</span>
        </h2>
      </div>
      <div class="card-body" style="display:flex;justify-content:center;padding:24px 16px">
        <div class="phone-preview">
          <div class="phone-screen">
            <div class="phone-status">
              <span>9:41</span>
              <span>
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi" style="margin:0 4px"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
              </span>
            </div>
            <div class="phone-notif">
              <div class="phone-notif-header">
                <div class="phone-notif-icon">
                  <i class="fa-solid fa-leaf"></i>
                </div>
                <span class="phone-notif-app">UpcycleConnect</span>
                <span class="phone-notif-time" data-i18n="notif_preview_now">maintenant</span>
              </div>
              <div class="phone-notif-title" id="previewTitre" data-i18n="notif_preview_titre">Titre de la notification</div>
              <div class="phone-notif-body" id="previewMessage" data-i18n="notif_preview_msg">Votre message apparaîtra ici...</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Stats audience estimée -->
      <div style="padding:0 20px 20px">
        <div style="background:var(--neutral-50);border-radius:var(--radius);padding:14px 16px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--neutral-400);margin-bottom:10px" data-i18n="notif_audience_estimee">
            Audience estimée
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:24px;font-weight:800;color:var(--uc-forest);font-family:'Montserrat',sans-serif" id="audienceCount">124</div>
              <div style="font-size:12px;color:var(--neutral-500)" id="audienceLabel" data-i18n="notif_label_tous">utilisateurs actifs</div>
            </div>
            <i class="fa-solid fa-users" style="font-size:28px;color:var(--uc-green-pale)"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="js/layout.js"></script>
<script>
// Données de démonstration, à remplacer par GET /api/admin/notifications/history
const MOCK_HISTORIQUE = [
  { id:1, titre:'Forum Upcycling 2026', message:'Inscrivez-vous au grand forum annuel !', segment:'tous', envoyes:124, date:'2026-04-15 10:30' },
  { id:2, titre:'Nouvelle formation disponible', message:'Couture zéro déchet, Paris 11e, 12 mai.', segment:'particulier', envoyes:68, date:'2026-04-12 14:15' },
  { id:3, titre:'Rappel : annonce expirante', message:'Votre annonce "Palettes bois" expire dans 48h.', segment:'particulier', envoyes:12, date:'2026-04-10 09:00' },
  { id:4, titre:'Nouveau lot disponible', message:'5 nouveaux objets à récupérer près de chez vous.', segment:'professionnel', envoyes:34, date:'2026-04-08 16:45' },
];

const AUDIENCE_PAR_SEGMENT = { tous: 124, particulier: 68, professionnel: 34, salarie: 22 };
function segmentLabel(seg) {
  const keys = { tous: 'notif_label_tous', particulier: 'notif_label_particulier', professionnel: 'notif_label_professionnel', salarie: 'notif_label_salarie' };
  return t(keys[seg] || 'notif_label_tous');
}

// previsualisation
function updatePreview() {
  const titre   = document.getElementById('notifTitre').value   || t('notif_preview_titre');
  const message = document.getElementById('notifMessage').value || t('notif_preview_msg');
  document.getElementById('previewTitre').textContent   = titre;
  document.getElementById('previewMessage').textContent = message;

  document.getElementById('titreCpt').textContent   = document.getElementById('notifTitre').value.length;
  document.getElementById('messageCpt').textContent = document.getElementById('notifMessage').value.length;
}

// segments
document.querySelectorAll('.segment-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const seg = btn.dataset.segment;
    document.getElementById('segmentValue').value = seg;
    document.getElementById('audienceCount').textContent = AUDIENCE_PAR_SEGMENT[seg] || 0;
    document.getElementById('audienceLabel').textContent = segmentLabel(seg);
  });
});

// historique
function renderHistorique(liste) {
  const cont = document.getElementById('historiqueNotifs');
  if (!liste.length) {
    cont.innerHTML = `<p style="text-align:center;color:var(--neutral-300);padding:20px">${t('notif_no_history')}</p>`;
    return;
  }
  cont.innerHTML = liste.map(n => `
    <div class="notif-hist-item">
      <div class="notif-hist-icon"><i class="fa-solid fa-bell"></i></div>
      <div style="flex:1">
        <div class="notif-hist-titre">${escAdmin(n.titre)}</div>
        <div class="notif-hist-meta">${escAdmin(n.message)}</div>
        <div style="margin-top:4px">
          <span class="badge badge-gray" style="font-size:10px">${escAdmin(n.segment)}</span>
        </div>
      </div>
      <div class="notif-hist-stats">
        <div class="notif-hist-envoyes">${n.envoyes} ${t('notif_envoyes_suffix')}</div>
        <div class="notif-hist-date">${n.date}</div>
      </div>
    </div>`).join('');
}

function resetForm() {
  document.getElementById('formNotif').reset();
  document.getElementById('segmentValue').value = 'tous';
  document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-segment="tous"]').classList.add('active');
  document.getElementById('audienceCount').textContent = AUDIENCE_PAR_SEGMENT.tous;
  document.getElementById('audienceLabel').textContent = segmentLabel('tous');
  document.getElementById('titreCpt').textContent   = '0';
  document.getElementById('messageCpt').textContent = '0';
  document.getElementById('notifError').style.display = 'none';
  updatePreview();
}

function escAdmin(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// envoi
document.getElementById('formNotif').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl  = document.getElementById('notifError');
  const btnEnv = document.getElementById('btnEnvoyer');
  errEl.style.display = 'none';

  const titre   = document.getElementById('notifTitre').value.trim();
  const message = document.getElementById('notifMessage').value.trim();
  const url     = document.getElementById('notifUrl').value.trim();
  const segment = document.getElementById('segmentValue').value;

  if (!titre || !message) {
    errEl.textContent    = t('notif_error_required');
    errEl.style.display  = 'block';
    return;
  }

  btnEnv.disabled      = true;
  btnEnv.innerHTML     = `<i class="fa-solid fa-spinner fa-spin"></i> ${t('notif_sending')}`;

  try {
    const res = await apiFetch('/admin/notifications', {
      method: 'POST',
      body: JSON.stringify({ titre, message, url: url || null, segment }),
    });
    if (res && res.ok) {
      showToast(`${t('notif_toast_prefix')} ${AUDIENCE_PAR_SEGMENT[segment]} ${t('notif_toast_suffix')}`, 'success');
    } else {
      throw new Error('API error');
    }
  } catch {
    // FIXME: afficher le vrai message d'erreur de l'API quand dispo
    // Fallback : on simule l'envoi localement
    const nb = AUDIENCE_PAR_SEGMENT[segment] || 0;
    MOCK_HISTORIQUE.unshift({
      id:      Date.now(),
      titre,
      message,
      segment,
      envoyes: nb,
      date:    new Date().toLocaleString(_lang === 'en' ? 'en-GB' : 'fr-FR', { dateStyle:'short', timeStyle:'short' }),
    });
    renderHistorique(MOCK_HISTORIQUE);
    showToast(`${t('notif_toast_prefix')} ${nb} ${t('notif_toast_local_suffix')}`, 'success');
  } finally {
    btnEnv.disabled = false;
    btnEnv.innerHTML = `<i class="fa-solid fa-paper-plane"></i> ${t('btn_envoyer')}`;
    resetForm();
  }
});

// init
document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('notifications');
  renderHistorique(MOCK_HISTORIQUE);
  updatePreview();
});
</script>
</body>
</html>
