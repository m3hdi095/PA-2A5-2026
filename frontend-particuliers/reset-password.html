<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Réinitialisation du mot de passe | UpcycleConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--neutral-50,#f9fafb); }
    .reset-box { background:#fff; border-radius:16px; padding:40px 36px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(45,74,62,.12); }
  </style>
</head>
<body>
<div class="reset-box">
  <div style="text-align:center;margin-bottom:28px">
    <div style="width:56px;height:56px;background:var(--teal-50);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
      <i class="fa-solid fa-lock" style="font-size:22px;color:var(--teal-600)"></i>
    </div>
    <h2 style="font-family:Poppins,sans-serif;font-size:1.3rem;font-weight:800;color:var(--text)">Nouveau mot de passe</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-top:6px">Choisissez un mot de passe sécurisé (min. 8 caractères)</p>
  </div>

  <div id="msg-error" style="display:none;background:#fde8e8;color:#c62828;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px"></div>
  <div id="msg-success" style="display:none;background:#d4eee3;color:#1e4535;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px"></div>

  <form id="form-reset" style="display:flex;flex-direction:column;gap:14px">
    <div class="form-group">
      <label class="form-label">Nouveau mot de passe <span class="form-required">*</span></label>
      <input type="password" id="pwd1" class="form-control" placeholder="Minimum 8 caractères" required minlength="8"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe <span class="form-required">*</span></label>
      <input type="password" id="pwd2" class="form-control" placeholder="Répétez le mot de passe" required/>
    </div>
    <button type="submit" class="btn btn-primary" id="btn-submit" style="justify-content:center">
      <i class="fa-solid fa-check"></i> Réinitialiser
    </button>
  </form>

  <div style="text-align:center;margin-top:20px">
    <a href="index.html" style="font-size:13px;color:var(--teal-600);text-decoration:none">
      <i class="fa-solid fa-arrow-left"></i> Retour à la connexion
    </a>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('msg-error').style.display = 'block';
  document.getElementById('msg-error').textContent = 'Lien invalide ou expiré. Demandez une nouvelle réinitialisation.';
  document.getElementById('form-reset').style.display = 'none';
}

document.getElementById('form-reset')?.addEventListener('submit', async e => {
  e.preventDefault();
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const errDiv = document.getElementById('msg-error');
  const okDiv  = document.getElementById('msg-success');
  errDiv.style.display = 'none';
  okDiv.style.display  = 'none';

  if (pwd1.length < 8) { errDiv.textContent = 'Minimum 8 caractères.'; errDiv.style.display = 'block'; return; }
  if (pwd1 !== pwd2)   { errDiv.textContent = 'Les mots de passe ne correspondent pas.'; errDiv.style.display = 'block'; return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'En cours...';

  try {
    const res = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, nouveau_mdp: pwd1 }),
    });
    const d = await res.json();
    if (res.ok) {
      okDiv.textContent = 'Mot de passe mis à jour ! Vous pouvez vous connecter.';
      okDiv.style.display = 'block';
      document.getElementById('form-reset').style.display = 'none';
      setTimeout(() => window.location.href = 'index.html', 2500);
    } else {
      errDiv.textContent = d.error || 'Lien expiré. Demandez une nouvelle réinitialisation.';
      errDiv.style.display = 'block';
    }
  } catch {
    errDiv.textContent = 'Service indisponible. Réessayez.';
    errDiv.style.display = 'block';
  }
  btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check"></i> Réinitialiser';
});
</script>
</body>
</html>
