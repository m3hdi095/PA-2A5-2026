<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="../brand_assets/Favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annonces | Espace Particuliers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1>
      <div class="page-title-icon teal">
        <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
      </div>
      <span data-i18n="page_annonces_title">Annonces</span>
    </h1>
    <p class="page-title-sub"><span data-i18n="page_annonces_sub">Parcourez les dons et ventes de la communauté</span> <span id="total-annonces">-</span></p>
  </div>
  <div class="page-title-actions">
    <button id="btn-messages" class="btn btn-outline">
      <i class="fa-regular fa-envelope" aria-hidden="true"></i>
      Messages
      <span id="badge-msg-count" style="display:none;background:var(--teal-500);color:white;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px"></span>
    </button>
    <button id="btn-mes-annonces" class="btn btn-outline">
      <i class="fa-solid fa-list" aria-hidden="true"></i>
      Mes annonces
    </button>
    <button id="btn-nouvelle-annonce" class="btn btn-primary">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="annonce_btn_new">Publier une annonce</span>
    </button>
  </div>
</div>

<!-- Filtres -->
<div class="card animate-in">
  <div class="card-body" style="padding:14px 18px">
    <div class="filters-row">
      <div class="filter-search" style="flex:2;min-width:200px">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input type="text" id="f-recherche" class="form-control" data-i18n-placeholder="search_annonce" placeholder="Rechercher une annonce..."/>
      </div>
      <select id="f-type" class="filter-select">
        <option value="" data-i18n="filter_tous_types">Tous types</option>
        <option value="don" data-i18n="filter_dons">Dons</option>
        <option value="vente" data-i18n="filter_ventes">Ventes</option>
      </select>
      <select id="f-categorie" class="filter-select">
        <option value="">Chargement…</option>
      </select>
      <select id="f-tri" class="filter-select">
        <option value="recent" data-i18n="filter_plus_recent">Plus récentes</option>
        <option value="prix_asc" data-i18n="filter_prix_asc">Prix croissant</option>
        <option value="prix_desc" data-i18n="filter_prix_desc">Prix décroissant</option>
      </select>
      <select id="f-projet" class="filter-select">
        <option value="" data-i18n="filter_tous_projets">Tous projets</option>
        <option value="meuble" data-i18n="filter_proj_meuble">Meubles</option>
        <option value="vetement" data-i18n="filter_proj_vetement">Vêtements</option>
        <option value="decoration" data-i18n="filter_proj_decoration">Décoration</option>
        <option value="art" data-i18n="filter_proj_art">Art & Création</option>
        <option value="jardin" data-i18n="filter_proj_jardin">Jardin</option>
        <option value="construction" data-i18n="filter_proj_construction">Construction</option>
        <option value="autre" data-i18n="filter_proj_autre">Autre projet</option>
      </select>
      <button id="btn-gps" class="btn btn-outline btn-sm" onclick="toggleGPS()" title="Filtrer par localisation" style="flex-shrink:0;white-space:nowrap">
        <i class="fa-solid fa-location-crosshairs" aria-hidden="true"></i>
        <span data-i18n="filter_proximite">Proximité</span>
      </button>
    </div>
    <div id="gps-row" style="display:none;margin-top:10px;display:none;align-items:center;gap:10px;font-size:13px">
      <i class="fa-solid fa-circle-dot" style="color:var(--teal-600)" aria-hidden="true"></i>
      <span id="gps-label" style="color:var(--text-soft)">Position active</span>
      <label style="display:flex;align-items:center;gap:6px">
        <span data-i18n="filter_rayon">Rayon</span>
        <select id="f-rayon" class="filter-select" style="padding:4px 8px;font-size:12px" onchange="onRayonChange()">
          <option value="5">5 km</option>
          <option value="10" selected>10 km</option>
          <option value="25">25 km</option>
          <option value="50">50 km</option>
        </select>
      </label>
      <button class="btn btn-ghost btn-sm" onclick="desactiverGPS()" style="padding:4px 8px;font-size:12px;color:var(--text-muted)">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>

<!-- Grille annonces -->
<div id="annonces-container" class="annonces-grid"></div>

<!-- Pagination -->
<div id="pagination-wrap" class="pagination" style="justify-content:center"></div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="detail-titre">Détail</div>
      <button class="modal-close" id="modal-detail-close">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- Section messagerie (section pleine page, pas un modal) -->
<div id="section-messages" style="display:none">
  <div style="display:grid;grid-template-columns:300px 1fr;border:1px solid var(--border);border-radius:12px;overflow:hidden;height:560px;background:white">
    <!-- Gauche : liste des conversations -->
    <div style="border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px">
        <i class="fa-regular fa-envelope" style="color:var(--teal-500)"></i>
        Mes messages
      </div>
      <div id="conv-items" style="flex:1;overflow-y:auto"></div>
    </div>
    <!-- Droite : fil de discussion -->
    <div style="display:flex;flex-direction:column;background:var(--neutral-50,#f8fafc)">
      <div id="conv-thread-header" style="padding:13px 18px;border-bottom:1px solid var(--border);background:white;font-weight:600;font-size:13px;color:var(--text);min-height:48px;display:flex;align-items:center;gap:10px">
        <span style="color:var(--text-muted);font-weight:400;font-size:12px">Sélectionnez une conversation</span>
      </div>
      <div id="conv-thread" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px"></div>
      <div id="conv-input-wrap" style="padding:12px 16px;border-top:1px solid var(--border);background:white;display:none">
        <form id="conv-form-msg" style="display:flex;gap:8px">
          <input type="text" id="conv-msg-input" class="form-control" placeholder="Votre message..." autocomplete="off" style="flex:1;font-size:13px"/>
          <button type="submit" class="btn btn-primary" style="padding:0 14px">
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal nouvelle annonce -->
<div class="modal-overlay" id="modal-annonce">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
        <span data-i18n="annonce_btn_new">Publier une annonce</span>
      </div>
      <button class="modal-close" id="modal-annonce-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-annonce" style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label"><span data-i18n="annonce_titre">Titre</span> <span class="form-required">*</span></label>
          <input type="text" id="a-titre" class="form-control" placeholder="Ex: Lot de palettes bois EUR" required/>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="annonce_description">Description</label>
          <textarea id="a-desc" class="form-control" rows="3" placeholder="Décrivez l'objet, son état, les dimensions..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" data-i18n="annonce_type">Type</label>
            <select id="a-type" class="form-control">
              <option value="don" data-i18n="annonce_type_don">Don (gratuit)</option>
              <option value="vente" data-i18n="annonce_type_vente">Vente</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="annonce_prix">Prix (€)</label>
            <input type="number" id="a-prix" class="form-control" value="0" min="0" step="0.01"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="annonce_type">Catégorie</label>
          <select id="a-categorie" class="form-control">
            <option value="">Chargement...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="annonce_projet_potentiel">Projet potentiel</label>
          <select id="a-projet" class="form-control">
            <option value="" data-i18n="annonce_proj_aucun">Non spécifié</option>
            <option value="meuble" data-i18n="filter_proj_meuble">Meubles</option>
            <option value="vetement" data-i18n="filter_proj_vetement">Vêtements</option>
            <option value="decoration" data-i18n="filter_proj_decoration">Décoration</option>
            <option value="art" data-i18n="filter_proj_art">Art & Création</option>
            <option value="jardin" data-i18n="filter_proj_jardin">Jardin</option>
            <option value="construction" data-i18n="filter_proj_construction">Construction</option>
            <option value="autre" data-i18n="filter_proj_autre">Autre projet</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Localisation <span class="form-required">*</span></label>
          <input type="text" id="a-localisation" class="form-control" placeholder="Ex: Paris 11e, Lyon 2e..." required/>
        </div>
        <div class="form-group">
          <label class="form-label">Photos <span class="form-required">*</span> <span style="color:var(--text-muted);font-weight:400">(min 1, max 10, 2 Mo chacune)</span></label>
          <input type="file" id="a-photos" class="form-control" accept="image/*" multiple style="padding:6px"/>
          <div id="a-photos-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-annonce').classList.remove('open')" data-i18n="annonce_annuler">Annuler</button>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            <span data-i18n="annonce_btn_submit">Publier</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js"></script>
<script src="js/annonces.js"></script>

</body>
</html>
