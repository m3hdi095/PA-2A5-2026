<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annonces | Espace Particuliers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1>
      <div class="page-title-icon teal">
        <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
      </div>
      <span data-i18n="page_annonces_title">Annonces</span>
    </h1>
    <p class="page-title-sub"><span data-i18n="page_annonces_sub">Parcourez les dons et ventes de la communauté</span> <span id="total-annonces">—</span></p>
  </div>
  <div class="page-title-actions">
    <button id="btn-nouvelle-annonce" class="btn btn-primary">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="annonce_btn_new">Publier une annonce</span>
    </button>
  </div>
</div>

<!-- Filtres -->
<div class="card animate-in">
  <div class="card-body" style="padding:14px 18px">
    <div class="filters-row">
      <div class="filter-search" style="flex:2;min-width:200px">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input type="text" id="f-recherche" class="form-control" data-i18n-placeholder="search_annonce" placeholder="Rechercher une annonce..."/>
      </div>
      <select id="f-type" class="filter-select">
        <option value="" data-i18n="filter_tous_types">Tous types</option>
        <option value="don" data-i18n="filter_dons">Dons</option>
        <option value="vente" data-i18n="filter_ventes">Ventes</option>
      </select>
      <select id="f-categorie" class="filter-select">
        <option value="" data-i18n="filter_toutes_categories">Toutes catégories</option>
        <option value="bois" data-i18n="filter_bois">Bois</option>
        <option value="textile" data-i18n="filter_textile">Textile</option>
        <option value="metal" data-i18n="filter_metal">Métal</option>
        <option value="plastique" data-i18n="filter_plastique">Plastique</option>
        <option value="electronique" data-i18n="filter_electronique">Électronique</option>
        <option value="autre" data-i18n="filter_autre">Autre</option>
      </select>
      <select id="f-tri" class="filter-select">
        <option value="recent" data-i18n="filter_plus_recent">Plus récentes</option>
        <option value="prix_asc" data-i18n="filter_prix_asc">Prix croissant</option>
        <option value="prix_desc" data-i18n="filter_prix_desc">Prix décroissant</option>
      </select>
    </div>
  </div>
</div>

<!-- Grille annonces -->
<div id="annonces-container" class="annonces-grid"></div>

<!-- Pagination -->
<div id="pagination-wrap" class="pagination" style="justify-content:center"></div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="detail-titre">Détail</div>
      <button class="modal-close" id="modal-detail-close">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- Modal messagerie -->
<div class="modal-overlay" id="modal-msg">
  <div class="modal-box" style="max-width:520px;display:flex;flex-direction:column;max-height:80vh">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fa-regular fa-envelope" aria-hidden="true"></i>
        <span id="msg-annonce-titre">Conversation</span>
      </div>
      <button class="modal-close" id="modal-msg-close">&times;</button>
    </div>
    <div id="msg-thread" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-height:200px;background:var(--neutral-50,#f9fafb)"></div>
    <div style="padding:14px 20px;border-top:1px solid var(--border)">
      <form id="form-message" style="display:flex;gap:8px">
        <input type="text" id="msg-input" class="form-control" placeholder="Votre message…" autocomplete="off" style="flex:1"/>
        <button type="submit" class="btn btn-primary" style="padding:0 16px">
          <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Modal nouvelle annonce -->
<div class="modal-overlay" id="modal-annonce">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
        <span data-i18n="annonce_btn_new">Publier une annonce</span>
      </div>
      <button class="modal-close" id="modal-annonce-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-annonce" style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label"><span data-i18n="annonce_titre">Titre</span> <span class="form-required">*</span></label>
          <input type="text" id="a-titre" class="form-control" placeholder="Ex: Lot de palettes bois EUR" required/>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="annonce_description">Description</label>
          <textarea id="a-desc" class="form-control" rows="3" placeholder="Décrivez l'objet, son état, les dimensions..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" data-i18n="annonce_type">Type</label>
            <select id="a-type" class="form-control">
              <option value="don" data-i18n="annonce_type_don">Don (gratuit)</option>
              <option value="vente" data-i18n="annonce_type_vente">Vente</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="annonce_prix">Prix (€)</label>
            <input type="number" id="a-prix" class="form-control" value="0" min="0" step="0.01"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="annonce_type">Catégorie</label>
          <select id="a-categorie" class="form-control">
            <option value="bois" data-i18n="filter_bois">Bois</option>
            <option value="textile" data-i18n="filter_textile">Textile</option>
            <option value="metal" data-i18n="filter_metal">Métal</option>
            <option value="plastique" data-i18n="filter_plastique">Plastique</option>
            <option value="electronique" data-i18n="filter_electronique">Électronique</option>
            <option value="autre" data-i18n="filter_autre">Autre</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-annonce').classList.remove('open')" data-i18n="annonce_annuler">Annuler</button>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            <span data-i18n="annonce_btn_submit">Publier</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/layout.js"></script>
<script src="js/annonces.js"></script>

</body>
</html>
