<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espace conseil | Espace Particuliers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1>
      <div class="page-title-icon teal">
        <i class="fa-solid fa-lightbulb" aria-hidden="true"></i>
      </div>
      <span data-i18n="conseils_title">Espace conseil</span>
    </h1>
    <p class="page-title-sub" data-i18n="conseils_subtitle">Conseils et astuces de la communauté upcycling</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-primary" id="btn-nouveau-conseil">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      <span data-i18n="conseils_btn_poser">Poser une question</span>
    </button>
  </div>
</div>

<!-- Catégories de conseils -->
<div class="card animate-in" style="margin-bottom:20px">
  <div class="card-body" style="display:flex;gap:8px;flex-wrap:wrap;padding:16px">
    <button class="btn btn-primary btn-sm" onclick="filtrerConseils('tous')" data-i18n="conseils_cat_tous">Tous</button>
    <button class="btn btn-outline btn-sm" onclick="filtrerConseils('technique')">
      <i class="fa-solid fa-wrench"></i> <span data-i18n="conseils_cat_technique">Technique</span>
    </button>
    <button class="btn btn-outline btn-sm" onclick="filtrerConseils('materiaux')">
      <i class="fa-solid fa-cubes"></i> <span data-i18n="conseils_cat_materiaux">Matériaux</span>
    </button>
    <button class="btn btn-outline btn-sm" onclick="filtrerConseils('projets')">
      <i class="fa-solid fa-paint-brush"></i> <span data-i18n="conseils_cat_projets">Projets</span>
    </button>
    <button class="btn btn-outline btn-sm" onclick="filtrerConseils('outils')">
      <i class="fa-solid fa-toolbox"></i> <span data-i18n="conseils_cat_outils">Outils</span>
    </button>
  </div>
</div>

<!-- Articles conseils -->
<div id="conseils-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px" class="animate-in">
</div>

<script src="js/layout.js"></script>
<script>

const CATS = { tous: '', technique: '#e8a020', materiaux: '#2e8b57', projets: '#5C7C6E', outils: '#1e4535' };

function rendreCarte(c) {
  const couleur = CATS[c.categorie] || '#5C7C6E';
  return `
    <div class="card" style="cursor:pointer;transition:transform .2s,box-shadow .2s" onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 28px rgba(45,74,62,.14)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
      <div style="height:4px;background:${couleur};border-radius:var(--radius-lg) var(--radius-lg) 0 0"></div>
      <div class="card-body" style="padding:20px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span class="badge" style="background:${couleur}20;color:${couleur};font-size:10px;padding:3px 10px">${c.categorie}</span>
        </div>
        <h3 style="font-family:var(--font-heading);font-size:14.5px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:10px">${c.titre}</h3>
        <p style="font-size:12.5px;color:var(--text-soft);line-height:1.55;margin-bottom:16px">${c.extrait}</p>
        ${(c.tags && c.tags.length) ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${c.tags.map(t => `<span style="background:var(--green-50);color:var(--green-700);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px">#${t}</span>`).join('')}</div>` : ''}
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${(c.auteur||'?').charAt(0)}</div>
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--text)">${c.auteur || 'Équipe UpcycleConnect'}</div>
              <div style="font-size:10.5px;color:var(--text-muted)">${c.role || 'Salarié'} · ${c.date ? new Date(c.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '—'}</div>
            </div>
          </div>
          <div style="display:flex;gap:12px">
            <span style="font-size:12px;color:var(--text-muted)"><i class="fa-regular fa-heart"></i> ${c.likes || 0}</span>
            <span style="font-size:12px;color:var(--text-muted)"><i class="fa-solid fa-share-nodes"></i> ${c.reposts || 0}</span>
          </div>
        </div>
      </div>
    </div>`;
}

let filtreCourant = 'tous';
function filtrerConseils(cat) {
  filtreCourant = cat;
  const filtered = cat === 'tous' ? conseilsData : conseilsData.filter(c => c.categorie === cat);
  afficherConseils(filtered);
}

let conseilsData = [];

async function chargerConseils() {
  try {
    const res = await apiFetch(`/conseils?lang=${_lang}`);
    if (res?.ok) {
      const data = await res.json();
      if (Array.isArray(data)) {
        conseilsData = data.map(c => ({
          id:        c.id,
          categorie: c.categorie || 'conseil',
          titre:     c.titre,
          auteur:    'Équipe UpcycleConnect',
          role:      'Salarié',
          date:      c.date_publication,
          extrait:   (c.contenu || '').slice(0, 220) + ((c.contenu || '').length > 220 ? '…' : ''),
          likes:     c.likes || 0,
          reposts:   0,
          tags:      [],
        }));
      }
    }
  } catch {}
  if (!conseilsData.length) {
    document.getElementById('conseils-grid').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">Aucun article disponible pour le moment.</p>';
    return;
  }
  afficherConseils(conseilsData);
}

function afficherConseils(liste) {
  document.getElementById('conseils-grid').innerHTML = liste.map(rendreCarte).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('conseils');
  await chargerConseils();
});
</script>

</body>
</html>
