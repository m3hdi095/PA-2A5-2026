<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statistiques & rapports | Espace Professionnel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page-title-row animate-in">
  <div>
    <h1>
      <div class="page-title-icon green">
        <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
      </div>
      <span data-i18n="stats_title">Statistiques & rapports</span>
    </h1>
    <p class="page-title-sub" data-i18n="stats_subtitle">Votre activité upcycling en chiffres</p>
  </div>
  <div class="page-title-actions">
    <button class="btn btn-outline btn-sm" onclick="exportRapport()">
      <i class="fa-solid fa-download" aria-hidden="true"></i>
      <span data-i18n="btn_export_pdf">Exporter PDF</span>
    </button>
  </div>
</div>

<!-- KPIs -->
<div class="stats-grid animate-in">
  <div class="stat-card" style="--accent:var(--green-700);--icon-bg:var(--green-50)">
    <div class="stat-icon"><i class="fa-solid fa-hand-holding-box"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-recup">-</div>
      <div class="stat-label" data-i18n="stat_recup_totales">Récupérations totales</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:#3d7a60;--icon-bg:#e8f5ee">
    <div class="stat-icon" style="background:#e8f5ee;color:#3d7a60"><i class="fa-solid fa-leaf"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-kg">-</div>
      <div class="stat-label" data-i18n="stat_materiaux_valorises">Kg recyclés</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:#1e4535;--icon-bg:#d4eee3">
    <div class="stat-icon" style="background:#d4eee3;color:#1e4535"><i class="fa-solid fa-cloud"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-co2">-</div>
      <div class="stat-label" data-i18n="stat_co2_economise">CO₂ économisé (est.)</div>
    </div>
  </div>
  <div class="stat-card" style="--accent:#6BA870;--icon-bg:var(--green-100)">
    <div class="stat-icon" style="background:var(--green-100);color:#6BA870"><i class="fa-solid fa-diagram-project"></i></div>
    <div class="stat-info">
      <div class="stat-value" id="stat-projets">-</div>
      <div class="stat-label" data-i18n="stat_projets_termines">Projets terminés</div>
    </div>
  </div>
</div>

<!-- Graphiques -->
<div class="dashboard-charts animate-in" style="gap:20px;margin-top:0">

  <div class="card">
    <div class="card-header">
      <h2><i class="fa-solid fa-chart-bar"></i> <span data-i18n="stats_chart_recup_title">Récupérations par mois</span></h2>
    </div>
    <div class="card-body">
      <canvas id="chart-recup" height="200"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2><i class="fa-solid fa-chart-pie"></i> <span>Dépôts par statut</span></h2>
    </div>
    <div class="card-body" style="display:flex;align-items:center;justify-content:center">
      <canvas id="chart-cats" height="220" width="220"></canvas>
    </div>
  </div>

</div>

<!-- Tableau détaillé -->
<div class="card animate-in" style="margin-top:20px">
  <div class="card-header">
    <h2><i class="fa-solid fa-table"></i> <span data-i18n="stats_detail_title">Détail des récupérations</span></h2>
  </div>
  <div style="overflow-x:auto">
    <table class="table">
      <thead>
        <tr>
          <th data-i18n="th_date">Date</th>
          <th>Objet</th>
          <th data-i18n="historique_conteneur">Conteneur</th>
          <th data-i18n="th_statut">Statut</th>
        </tr>
      </thead>
      <tbody id="stats-tbody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await initLayout('stats');
  await chargerStats();
});

async function chargerStats() {
  let depots  = [];
  let projets = [];
  let score   = { kg_recycles: 0 };

  const [resDepots, resProjets, resScore] = await Promise.all([
    apiFetch('/depots'),
    apiFetch('/projets/mes-projets'),
    apiFetch('/score'),
  ]);

  if (resDepots?.ok)  { const d = await resDepots.json();  if (Array.isArray(d)) depots  = d; }
  if (resProjets?.ok) { const d = await resProjets.json(); if (Array.isArray(d)) projets = d; }
  if (resScore?.ok)   { const d = await resScore.json();   score = d; }

  const recuperes  = depots.filter(d => d.statut === 'recupere');
  const termines   = projets.filter(p => p.statut === 'termine');
  const kgRecycles = Math.round(score.kg_recycles ?? 0);
  const co2        = Math.round(kgRecycles * 0.9);

  document.getElementById('stat-recup').textContent   = recuperes.length;
  document.getElementById('stat-kg').textContent      = kgRecycles + ' kg';
  document.getElementById('stat-co2').textContent     = co2 + ' kg';
  document.getElementById('stat-projets').textContent = termines.length;

  // Graphe barres : dépôts par mois (6 derniers mois)
  const now = new Date();
  const locale = _lang === 'en' ? 'en-GB' : 'fr-FR';
  const moisLabels = [];
  const moisData   = [];
  for (let i = 5; i >= 0; i--) {
    const d  = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    moisLabels.push(d.toLocaleDateString(locale, { month: 'short' }));
    moisData.push(depots.filter(dep => (dep.date_demande || '').startsWith(ym)).length);
  }

  if (window.Chart) {
    new Chart(document.getElementById('chart-recup'), {
      type: 'bar',
      data: {
        labels: moisLabels,
        datasets: [{
          label: 'Dépôts',
          data: moisData,
          backgroundColor: 'rgba(45,102,79,.75)',
          borderRadius: 6,
        }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
      },
    });

    // Graphe doughnut : répartition par statut
    const statutCounts = {};
    depots.forEach(d => { statutCounts[d.statut] = (statutCounts[d.statut] || 0) + 1; });
    const COLORS = ['#2D664F','#6BA870','#B2DEC3','#c67c28','#c0392b'];
    const labels = Object.keys(statutCounts);
    const data   = Object.values(statutCounts);

    if (labels.length) {
      new Chart(document.getElementById('chart-cats'), {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: COLORS.slice(0, labels.length), borderWidth: 0 }],
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } },
      });
    } else {
      const canvas = document.getElementById('chart-cats');
      if (canvas) canvas.parentElement.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px 0">Aucun dépôt enregistré.</p>';
    }
  }

  // Tableau des dépôts
  const tbody = document.getElementById('stats-tbody');
  if (!tbody) return;

  if (!depots.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted)">Aucun dépôt enregistré.</td></tr>`;
    return;
  }

  const STATUT_BADGE = {
    recupere:   '<span class="badge badge-success">Récupéré</span>',
    valide:     '<span class="badge badge-green">Validé</span>',
    en_attente: '<span class="badge badge-warning">En attente</span>',
    refuse:     '<span class="badge badge-danger">Refusé</span>',
  };

  tbody.innerHTML = depots.map(d => {
    const date = d.date_demande
      ? new Date(d.date_demande).toLocaleDateString(locale, { day:'numeric', month:'short', year:'numeric' })
      : '-';
    return `
      <tr>
        <td style="color:var(--text-muted);font-size:12px">${date}</td>
        <td style="font-weight:600">Objet #${d.id_objet}</td>
        <td>
          <i class="fa-solid fa-location-dot" style="color:var(--green-500);margin-right:4px" aria-hidden="true"></i>
          Conteneur #${d.id_conteneur}
        </td>
        <td>${STATUT_BADGE[d.statut] || `<span class="badge badge-gray">${esc(d.statut)}</span>`}</td>
      </tr>`;
  }).join('');
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportRapport() {
  showToast('Export PDF disponible avec l\'abonnement Premium', 'info');
}
</script>

</body>
</html>
