services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-uc_password_2026}
      MYSQL_DATABASE: ${DB_NAME:-upcycleconnect}
      MYSQL_USER: ${DB_USER:-uc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-uc_password_2026}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../upcycleconnect.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-uc_password_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Dans Docker, l'API parle à "db:3306", pas à 127.0.0.1:3307
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-uc_user}
      DB_PASSWORD: ${DB_PASSWORD:-uc_password_2026}
      DB_NAME: ${DB_NAME:-upcycleconnect}
      JWT_SECRET: ${JWT_SECRET:-upcycle_super_secret_key_2026_changez_moi_en_prod}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
