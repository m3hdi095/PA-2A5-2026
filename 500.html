<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur serveur — UpcycleConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #2D664F;
      --color-primary-light: #B2DEC3;
      --color-surface-alt: #e8f5ee;
      --color-error-text: #c0392b;
      --color-error-bg: #fdecea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--color-surface-alt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 64px 40px;
      max-width: 480px;
      box-shadow: 0 1px 2px rgba(45,102,79,0.06), 0 4px 12px rgba(45,102,79,0.10), 0 12px 32px rgba(45,102,79,0.07);
    }
    .code {
      font-family: 'Poppins', sans-serif;
      font-size: 80px;
      font-weight: 700;
      color: #f5c6c0;
      line-height: 1;
    }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--color-error-text);
      margin: 16px 0 8px;
    }
    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: var(--color-primary);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 200ms ease, opacity 200ms ease;
    }
    a:hover { opacity: 0.88; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">500</div>
    <h1>Erreur serveur</h1>
    <p>Une erreur inattendue s'est produite. Veuillez réessayer dans quelques instants.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
